rted to decision-makers?", "Is the monitoring program reviewed annually?"], "e": "Continuous Monitoring Strategy, Assessment Schedule, Monitoring Reports, SIEM Dashboard", "sec": "CA — ASSESSMENT, AUTHORIZATION & MONITORING"}, {"i": "CM-2", "t": "Baseline Configuration", "d": "Develop, document, and maintain baseline configurations for all information technology components.", "s": ["Define baseline configurations per asset type (OS, server, network, cloud)", "Document baselines in CMDB or configuration repository", "Establish change control process for baseline deviations", "Scan systems for configuration compliance weekly", "Update baselines after major patches or system changes"], "q": ["Are baseline configurations documented for all asset types?", "Are deviations from baselines tracked and approved?", "Are baselines reviewed and updated after major changes?", "Are configurations stored in a configuration management system?"], "e": "Baseline Configuration Documents, Deviation Register, CMDB, Change Records, Review Dates", "sec": "CM — CONFIGURATION MANAGEMENT"}, {"i": "CM-6", "t": "Configuration Settings", "d": "Establish and document configuration settings for IT products that reflect the most restrictive settings consistent with operational requirements.", "s": ["Define restrictive configuration settings per CIS Benchmarks", "Enforce settings via Group Policy (Windows) or MDM/profiles", "Document approved exceptions with risk acceptance", "Validate settings after each system update or major patch", "Audit configuration compliance monthly"], "q": ["Are restrictive configuration settings applied and documented?", "Are configuration settings enforced via Group Policy or MDM?", "Are settings validated after system updates?", "Are exceptions documented and risk-approved?"], "e": "Configuration Settings Document, GPO/MDM Evidence, Compliance Scan Results, Exception Register", "sec": "CM — CONFIGURATION MANAGEMENT"}, {"i": "IR-4", "t": "Incident Handling", "d": "Implement an incident handling capability including preparation, detection, analysis, containment, eradication, and recovery.", "s": ["Develop IRP covering all NIST IR phases", "Create playbooks for top 5 incident types (ransomware, phishing, data breach, DDoS, insider threat)", "Implement incident tracking system (ticketing)", "Define escalation and notification thresholds", "Conduct post-incident review within 5 business days of closure"], "q": ["Does the IRP cover all 6 phases (Prep, Detect, Analyze, Contain, Eradicate, Recover)?", "Are containment procedures documented per incident type?", "Are incidents tracked from detection to closure?", "Is post-incident review conducted?"], "e": "Incident Response Plan, Incident Type Playbooks, Incident Register, Post-Incident Review Reports", "sec": "IR — INCIDENT RESPONSE"}, {"i": "SC-8", "t": "Transmission Confidentiality & Integrity", "d": "Implement cryptographic mechanisms to prevent unauthorized disclosure and modification of information during transmission.", "s": ["Enforce TLS 1.2 or higher on all services and APIs", "Disable weak/deprecated cipher suites (RC4, 3DES, TLS 1.0/1.1)", "Build certificate inventory with expiry dates", "Configure certificate expiry alerts (60-day warning)", "Conduct quarterly TLS configuration scans"], "q": ["Is TLS 1.2+ enforced for all data in transit?", "Are expired or weak cipher suites disabled?", "Are certificates managed and monitored for expiry?", "Is HTTPS enforced for all web-facing services?"], "e": "TLS Configuration Evidence, Certificate Inventory, SSL Scan Results, Certificate Monitoring Alerts", "sec": "SC — SYSTEM & COMMUNICATIONS PROTECTION"}], "PCI-DSS v4.0": [{"i": "PCI-1.2", "t": "Network Security Controls Configuration", "d": "Configure network security controls (firewalls, routers) to restrict inbound/outbound traffic to only what is necessary for cardholder data protection.", "s": ["Document all firewall and router rule sets", "Define 'need-to-know' business justification per rule", "Implement default-deny policies with explicit allow rules", "Isolate CDE from all untrusted networks", "Review and certify all rule sets every 6 months"], "q": ["Are firewall rules documented and reviewed at least every 6 months?", "Is inbound and outbound traffic restricted to business necessity?", "Is the cardholder data environment (CDE) isolated from untrusted networks?", "Are 'deny all' rules in place as default?"], "e": "Firewall Rule Sets, Review Records, Network Diagram, CDE Isolation Evidence", "sec": "REQUIREMENT 1 — NETWORK SECURITY CONTROLS"}, {"i": "PCI-2.2", "t": "System Configuration Standards", "d": "Develop configuration standards for all system components that address all known security vulnerabilities and are consistent with industry hardening standards.", "s": ["Develop configuration standards per system type (OS, database, web server)", "Align standards to CIS Benchmarks or equivalent", "Require standard compliance before any system enters CDE", "Scan systems for compliance on deployment and quarterly", "Review and update standards annually"], "q": ["Are hardening standards defined for all system types in CDE?", "Are standards based on CIS, NIST, or vendor guidance?", "Are system components configured per standards before deployment?", "Are standards reviewed annually?"], "e": "System Configuration Standards, CIS Benchmark Alignment Evidence, Pre-Deployment Checklist, Review Records", "sec": "REQUIREMENT 2 — SECURE CONFIGURATIONS"}, {"i": "PCI-3.4", "t": "Encryption of Stored PAN", "d": "Render Primary Account Numbers (PAN) unreadable anywhere they are stored using strong cryptography (AES-256 or equivalent).", "s": ["Identify all locations where PAN is stored", "Eliminate unnecessary PAN storage", "Encrypt all stored PAN with AES-256", "Implement separate key management (HSM or equivalent)", "Rotate encryption keys annually and on compromise"], "q": ["Is PAN stored only where necessary?", "Is stored PAN encrypted with AES-256 or equivalent?", "Are encryption keys managed separately from encrypted data?", "Is key rotation performed at least annually?"], "e": "Encryption Configuration, Key Management Procedures, Data Discovery Scan Results, Key Rotation Records", "sec": "REQUIREMENT 3 — PROTECT STORED ACCOUNT DATA"}, {"i": "PCI-6.3", "t": "Security Vulnerabilities — Identification & Protection", "d": "Protect all system components from known vulnerabilities by installing applicable security patches within defined timeframes.", "s": ["Subscribe to vendor and CVE vulnerability notifications", "Define patching SLAs: Critical ≤1 month, High ≤2 months", "Implement automated patching for OS and applications", "Scan CDE after any significant change", "Track third-party component vulnerabilities (SCA tools)"], "q": ["Are critical patches applied within 1 month of release?", "Is a vulnerability management process documented?", "Are systems in CDE scanned after any significant change?", "Are third-party dependencies tracked for vulnerabilities?"], "e": "Patch Management Policy, Vulnerability Scan Reports, Patch Application Evidence, Third-Party Dependency Tracking", "sec": "REQUIREMENT 6 — SECURE SYSTEMS & SOFTWARE"}, {"i": "PCI-8.3", "t": "Multi-Factor Authentication", "d": "Implement multi-factor authentication for all non-console administrative access and all remote network access originating from outside the entity's network.", "s": ["Identify all admin and remote access points requiring MFA", "Implement MFA for all admin console access (no exceptions)", "Enforce MFA for all VPN and remote network access", "Control, document, and audit any MFA bypass mechanisms", "Review MFA configuration quarterly"], "q": ["Is MFA enforced for all admin console access?", "Is MFA required for all remote access?", "Are MFA bypass mechanisms controlled and audited?", "Is MFA configuration reviewed periodically?"], "e": "MFA Configuration Evidence, Admin Access Logs, Remote Access Policy, MFA Bypass Audit Logs", "sec": "REQUIREMENT 8 — IDENTIFY & AUTHENTICATE ACCESS"}, {"i": "PCI-10.2", "t": "Audit Log Implementation", "d": "Implement audit logs to capture all individual user access to cardholder data, all actions taken by any individual with root or admin privileges, and all access to audit logs.", "s": ["Define and configure required PCI audit event types", "Centralize logs in SIEM", "Protect logs with integrity controls", "Enforce 12-month retention with 3-month immediate availability", "Establish daily log review process with audit trail"], "q": ["Are all required PCI event types logged?", "Are audit logs protected from modification?", "Are logs retained for 12 months minimum (3 months online)?", "Are logs reviewed daily?"], "e": "Audit Log Configuration, Log Protection Evidence, Retention Policy, Daily Review Records, SIEM Alerts", "sec": "REQUIREMENT 10 — LOG & MONITOR ALL ACCESS"}, {"i": "PCI-12.1", "t": "Information Security Policy", "d": "Establish, publish, maintain, and disseminate a security policy that addresses all PCI DSS requirements and reviews risks at least annually.", "s": ["Develop or update security policy to cover all PCI DSS requirements", "Map each policy section to corresponding PCI requirement", "Get executive approval", "Distribute to all personnel and require annual acknowledgment", "Conduct annual risk assessment and policy review", "Update policy when significant environment changes occur"], "q": ["Is a comprehensive security policy documented?", "Does the policy address all PCI DSS requirements?", "Is the policy reviewed and updated at least annually?", "Is the policy distributed and acknowledged by all personnel?"], "e": "Security Policy Document, PCI Requirement Mapping, Review Records, Staff Acknowledgments, Annual Risk Assessment", "sec": "REQUIREMENT 12 — SUPPORT INFORMATION SECURITY"}], "GDPR": [{"i": "GDPR-A5", "t": "Lawfulness, Fairness & Transparency", "d": "Personal data must be processed lawfully, fairly, and transparently. Individuals must know what data is collected and why.", "s": ["Map all personal data processing activities", "Identify and document legal basis for each processing activity", "Draft or update privacy notice in plain language", "Publish privacy notice and make it easily accessible", "Review privacy notice annually or on significant changes"], "q": ["Is a legal basis identified for each processing activity?", "Is a privacy notice published and accessible?", "Are data subjects informed at the point of collection?", "Is the privacy notice written in plain language?"], "e": "Processing Records (RoPA), Privacy Notice, Legal Basis Register, Consent Records", "sec": "ARTICLE 5 — PRINCIPLES OF PROCESSING"}, {"i": "GDPR-A5b", "t": "Data Minimization & Purpose Limitation", "d": "Collect only the data that is necessary (minimization) and use it only for the purpose it was collected (purpose limitation).", "s": ["Inventory all personal data fields collected", "For each field, document the purpose and legal basis", "Eliminate data fields with no documented necessity", "Review data collection forms and processes for minimization", "Conduct annual data minimization review"], "q": ["Is data collected limited to what is necessary?", "Are purposes documented and enforced?", "Is data used for compatible purposes only?", "Are data fields reviewed for necessity?"], "e": "Data Inventory, Purpose Register, Data Minimization Review Records, RoPA", "sec": "ARTICLE 5 — PRINCIPLES OF PROCESSING"}, {"i": "GDPR-A7", "t": "Conditions for Consent", "d": "Where consent is the legal basis, it must be freely given, specific, informed, and unambiguous. Individuals must be able to withdraw consent easily.", "s": ["Audit all consent collection mechanisms", "Remove pre-ticked boxes and bundled consent", "Implement separate consent for each distinct purpose", "Build consent withdrawal mechanism (equal friction to giving)", "Store consent records with date, version, and identifier"], "q": ["Is consent obtained via a clear affirmative act (no pre-ticked boxes)?", "Is consent granular (separate for each purpose)?", "Is withdrawal of consent as easy as giving it?", "Are consent records maintained with timestamps?"], "e": "Consent Forms/Mechanisms, Consent Database, Withdrawal Process Evidence, Audit Trail", "sec": "ARTICLE 6 & 7 — LAWFUL BASIS & CONSENT"}, {"i": "GDPR-A13", "t": "Information to be Provided", "d": "Provide data subjects with specific information at the time of collection including controller identity, purposes, legal basis, retention periods, and rights.", "s": ["Audit current privacy notice against GDPR Art.13 mandatory elements", "Add any missing elements (retention periods, DPO contact, rights)", "Ensure notice is provided at point of data collection", "Translate notice if serving non-native-language populations", "Update notice on any change to processing activities"], "q": ["Does the privacy notice include all mandatory GDPR Art.13 elements?", "Is the notice provided at or before the point of collection?", "Is the notice reviewed when processing changes?", "Is the notice accessible in all relevant languages?"], "e": "Privacy Notice (with all Art.13 elements), Collection Point Audit, Notice Version History", "sec": "ARTICLE 13 & 14 — INFORMATION OBLIGATIONS"}, {"i": "GDPR-A17", "t": "Right to Erasure", "d": "Individuals can request deletion of their personal data, and you must comply within 1 month unless exceptions apply.", "s": ["Create a data subject request intake mechanism (form/email)", "Map all data stores containing personal data for deletion", "Define process to cascade deletion to all systems", "Document exceptions and escalation path", "Track and fulfill requests within 30-day SLA", "Log all requests and outcomes"], "q": ["Is there a process to receive and handle erasure requests?", "Can data be deleted from all systems including backups?", "Are requests fulfilled within 30 days?", "Are exceptions (legal hold, public interest) documented?"], "e": "Erasure Request Process, Request Register, Fulfillment Evidence, Exception Documentation", "sec": "ARTICLE 17–22 — DATA SUBJECT RIGHTS"}, {"i": "GDPR-A20", "t": "Data Portability", "d": "Provide personal data in a structured, commonly used, machine-readable format to data subjects upon request.", "s": ["Build or document data export functionality", "Ensure export produces structured, machine-readable format", "Test export across all data categories", "Define and document portability request process", "Track requests and fulfill within 30-day SLA"], "q": ["Is a data export mechanism available?", "Is data provided in a machine-readable format (CSV, JSON)?", "Are requests fulfilled within 30 days?", "Is there a process to transmit data directly to another controller?"], "e": "Data Export Function, Export Format Documentation, Request Register, Fulfillment Records", "sec": "ARTICLE 17–22 — DATA SUBJECT RIGHTS"}, {"i": "GDPR-A25", "t": "Privacy by Design", "d": "Integrate data protection into your systems and processes from the start, and default settings must be the most privacy-protective.", "s": ["Integrate privacy checklist into system design and procurement processes", "Review default settings on all systems (opt-out vs opt-in defaults)", "Identify high-risk processing activities requiring DPIA", "Conduct DPIAs before deployment of high-risk processing", "Embed privacy gate into SDLC (design, build, test phases)"], "q": ["Is privacy reviewed in system design and procurement?", "Are default settings the most restrictive?", "Is a DPIA process in place for high-risk processing?", "Is privacy engineering embedded in SDLC?"], "e": "Privacy Design Checklist, Default Settings Review, DPIA Register and Completed DPIAs, SDLC Privacy Gate Evidence", "sec": "ARTICLE 25 — DATA PROTECTION BY DESIGN & DEFAULT"}, {"i": "GDPR-A32", "t": "Technical & Organisational Measures", "d": "Implement appropriate technical and organisational measures to ensure security appropriate to the risk, including encryption, pseudonymisation, and resilience.", "s": ["Document all technical and organisational security measures (TOM Register)", "Implement encryption for personal data at rest and in transit", "Apply access controls (least privilege) to personal data systems", "Conduct annual security assessment of personal data processing", "Review and update TOMs when risk changes"], "q": ["Is personal data encrypted at rest and in transit?", "Are access controls applied to personal data systems?", "Is there a process to test and evaluate security measures?", "Are security measures proportional to the risk?"], "e": "Security Measures Register (TOMs), Encryption Config, Access Control Evidence, Security Testing Records", "sec": "ARTICLE 32 — SECURITY OF PROCESSING"}, {"i": "GDPR-A33", "t": "Breach Notification to Authority", "d": "Notify the supervisory authority within 72 hours of becoming aware of a personal data breach likely to result in risk to individuals.", "s": ["Define personal data breach detection and escalation procedure", "Identify who can declare a breach and initiate the 72-hour clock", "Prepare notification template for supervisory authority", "Train all staff on breach identification and reporting", "Maintain a breach log (including near-misses)", "Conduct breach simulation exercise annually"], "q": ["Is a breach identification and escalation process defined?", "Can a breach be detected, assessed, and reported within 72 hours?", "Is there a breach log?", "Are staff trained to recognize and report breaches?"], "e": "Breach Response Procedure, Breach Log, 72-Hour Notification Template, Staff Training Records", "sec": "ARTICLE 33 — BREACH NOTIFICATION"}], "ISO 27701": [{"i": "27701-5.1", "t": "PIMS Context of the Organization", "d": "Extend the ISMS context analysis to include privacy-related factors: applicable privacy regulations, data subject expectations, and PII processing activities.", "s": ["Extend ISMS scope to include PIMS boundary", "Map all applicable privacy regulations (GDPR, PDPA, PIPEDA, etc.)", "Develop Record of Processing Activities (RoPA)", "Document data subject categories and their expectations", "Get PIMS scope approved by top management"], "q": ["Is a Privacy Information Management System (PIMS) scope defined?", "Are applicable privacy laws and regulations documented?", "Is a Record of Processing Activities (RoPA) maintained?", "Are data subject expectations documented?"], "e": "PIMS Scope Statement, Regulatory Map, RoPA, Data Subject Expectations Register", "sec": "5 — PIMS-SPECIFIC REQUIREMENTS RELATED TO ISO/IEC 27001"}, {"i": "27701-5.4", "t": "PII Processor vs Controller Roles", "d": "Determine whether the organization acts as a PII Controller, PII Processor, or both, and implement controls appropriate to each role.", "s": ["Determine controller vs processor role per processing activity", "Draft Data Processing Agreement (DPA) template", "Execute DPAs with all third-party processors", "Maintain register of all controller and processor relationships", "Review roles annually or when processing changes"], "q": ["Is the organization's role (controller/processor) defined for each processing activity?", "Are DPA/contracts in place with all PII processors?", "Are processor obligations met when acting as processor?"], "e": "Role Determination Register, DPA Templates, Signed DPAs with Third Parties, Processor Obligations Checklist", "sec": "5 — PIMS-SPECIFIC REQUIREMENTS RELATED TO ISO/IEC 27001"}, {"i": "27701-6.4", "t": "Privacy Impact Assessments", "d": "Conduct Privacy Impact Assessments (PIAs/DPIAs) for new or changed processing that is likely to result in high risk to data subjects.", "s": ["Define PIA/DPIA methodology and threshold criteria", "Train relevant staff on when to conduct a DPIA", "Maintain a DPIA register", "Conduct DPIA for all new high-risk processing activities", "Document outcomes and implement mitigations", "Retain DPIAs and make available to supervisory authority"], "q": [" erification Procedures", "sec": "7 — PIMS-SPECIFIC GUIDANCE FOR PII CONTROLLERS"}, {"i": "27701-8.2", "t": "Customer Agreements & Obligations", "d": "Ensure all PII processing is governed by a legally binding agreement with the controller, covering processing instructions, security, and sub-processor management.", "s": ["Identify all controllers you act as processor for", "Execute DPAs with each controller covering mandatory clauses", "Maintain sub-processor register with controller approval", "Document and follow processing instructions from controllers", "Notify controllers of any sub-processor changes in advance"], "q": ["Are DPAs in place with all controllers you process for?", "Do DPAs cover all mandatory clauses?", "Are sub-processors disclosed and approved?", "Are processing instructions documented and followed?"], "e": "Executed DPAs, Sub-Processor Register, Processing Instruction Log, DPA Clause Checklist", "sec": "8 — PIMS-SPECIFIC GUIDANCE FOR PII PROCESSORS"}], "ISO 27017": [{"i": "27017-6.3.1", "t": "Shared Roles & Responsibilities", "d": "Understand and document the division of information security responsibilities between the cloud service customer (CSC) and cloud service provider (CSP).", "s": ["Map all cloud services in use (IaaS, PaaS, SaaS)", "Obtain shared responsibility documentation from each CSP", "Build shared responsibility matrix per service type", "Assign CSC-owned controls to internal owners", "Verify CSP controls via certifications or audit reports", "Review when cloud services or configurations change"], "q": ["Is a shared responsibility matrix documented for each CSP?", "Are CSC-owned controls identified and assigned?", "Are CSP responsibilities verified (SOC 2, CSA STAR, ISO 27001 cert)?", "Is the matrix reviewed when services change?"], "e": "Shared Responsibility Matrix, CSP Compliance Certifications, Control Assignment Register", "sec": "CLOUD-SPECIFIC CONTROLS — CUSTOMER (CLOUD SERVICE CUSTOMER)"}, {"i": "27017-9.1.1", "t": "Cloud Service Management", "d": "Implement policies and procedures for managing cloud services including procurement, onboarding, configuration, monitoring, and off-boarding.", "s": ["Build and maintain cloud service inventory", "Define approved cloud procurement process", "Document configuration standards per cloud service type", "Implement cloud security posture monitoring (CSPM)", "Define and test cloud service off-boarding and data deletion procedures"], "q": ["Is there a cloud service inventory?", "Are cloud services procured through an approved process?", "Are configurations documented and monitored?", "Is there a cloud off-boarding procedure?"], "e": "Cloud Service Inventory, Cloud Procurement Policy, Configuration Standards, Off-boarding Procedures", "sec": "CLOUD-SPECIFIC CONTROLS — CUSTOMER (CLOUD SERVICE CUSTOMER)"}, {"i": "27017-12.1.4", "t": "Virtual Machine Hardening", "d": "Apply security hardening to all virtual machines and cloud instances consistently, using approved baseline images.", "s": ["Define and maintain hardened base images in cloud image registry", "Enforce use of approved images for all new VM deployments", "Scan all cloud instances for configuration compliance", "Implement automated patching for cloud instances", "Define process for decommissioning and image updates"], "q": ["Are approved hardened images used for all VM deployments?", "Are VMs scanned for compliance post-deployment?", "Are unnecessary cloud services/ports disabled?", "Is patch management applied to cloud instances?"], "e": "Approved Image Registry, VM Compliance Scan Results, Hardening Baseline, Patch Management Evidence", "sec": "CLOUD-SPECIFIC CONTROLS — VIRTUAL ENVIRONMENTS"}, {"i": "27017-13.1.4", "t": "Network Segmentation in Cloud", "d": "Implement virtual network segmentation (VPCs, security groups, NACLs) to restrict traffic flows between cloud workloads.", "s": ["Design and implement VPC/VNet architecture with environment isolation", "Configure security groups with iness strategy?"], "e": "IT Management Framework, Process Catalogue, Org Charts, Business-IT Alignment Evidence", "sec": "ALIGN, PLAN & ORGANIZE (APO) — MANAGEMENT OBJECTIVES"}, {"i": "APO12", "t": "Managed Risk", "d": "Identify, assess, and manage IT risk continuously using a standardized risk management process integrated with enterprise risk management.", "s": ["Define and document IT risk management process", "Establish and maintain IT risk register", "Define risk scoring methodology (likelihood × impact)", "Conduct risk assessments at least annually and on significant changes", "Integrate IT risk into enterprise risk management reporting"], "q": ["Is a formal IT risk management process documented?", "Is the IT risk register maintained and current?", "Are risks assessed using a consistent methodology?", "Is IT risk integrated with ERM?"], "e": "IT Risk Management Process, Risk Register, Risk Assessment Methodology, ERM Integration Evidence", "sec": "ALIGN, PLAN & ORGANIZE (APO) — MANAGEMENT OBJECTIVES"}, {"i": "BAI06", "t": "Managed IT Changes", "d": "Manage all changes to IT systems in a controlled, traceable manner using a formal change management process.", "s": ["Define change management policy and process", "Establish Change Advisory Board (CAB) with defined membership", "Implement change request and approval workflow in ITSM tool", "Define and control emergency change process", "Track and report change success rate and backout rate", "Review change process effectiveness quarterly"], "q": ["Are all IT changes processed through a formal change process?", "Is a CAB (Change Advisory Board) established?", "Are emergency changes controlled and reviewed?", "Is change success rate measured?"], "e": "Change Management Policy, Change Register, CAB Meeting Minutes, Emergency Change Records, Change Success Metrics", "sec": "BUILD, ACQUIRE & IMPLEMENT (BAI) — MANAGEMENT OBJECTIVES"}, {"i": "DSS01", "t": "Managed Operations", "d": "Coordinate and execute operational activities and procedures for IT services, including event management, job scheduling, and environment management.", "s": ["Document all key IT operational procedures", "Implement event monitoring and alerting (SIEM, monitoring tools)", "Define operational KPIs (availability, incident rate, SLA compliance)", "Track and resolve operational incidents within SLA", "Review operational performance monthly"], "q": ["Are IT operational procedures documented?", "Is event management (monitoring) implemented?", "Are operational metrics defined and tracked?", "Are operational incidents tracked and resolved per SLA?"], "e": "Operational Procedures, Event Management Config, Operational Metrics Dashboard, Incident SLA Reports", "sec": "DELIVER, SERVICE & SUPPORT (DSS) — MANAGEMENT OBJECTIVES"}, {"i": "DSS05", "t": "Managed Security Services", "d": "Protect IT assets against malware, unauthorized access, and security incidents through a set of active and continuous security management practices.", "s": ["Implement and document security control framework", "Deploy endpoint protection (EDR/AV) on all endpoints", "Enable continuous security monitoring via SIEM", "Conduct vulnerability scans quarterly", "Report security posture to management monthly"], "q": ["Are security controls implemented and monitored?", "Is malware protection deployed on all endpoints?", "Are security events monitored continuously?", "Is vulnerability management performed regularly?"], "e": "Security Control Register, AV/EDR Deployment Evidence, SIEM Monitoring Evidence, Vulnerability Reports", "sec": "DELIVER, SERVICE & SUPPORT (DSS) — MANAGEMENT OBJECTIVES"}], "ISO 31000": [{"i": "31000-P", "t": "Risk Management Principles", "d": "Embed risk management as an integrated, structured, and comprehensive practice that is customized, inclusive, dynamic, and supports continual improvement.", "s": ["Define and document risk management principles aligned to ISO 31000", "Demonstrate integration of risk in strategic planning", "Include operational teams in risk identification", "Review and adapt risk approach based on outcomes", "Communicate principles to all relevant stakeholders"], "q": ["Is risk management integrated into strategic and operational decision-making?", "Is the risk management approach customized to the organization's context?", "Are all relevant stakeholders included in the risk management process?", "Is the risk management approach dynamic and reviewed regularly?"], "e": "Risk Management Principles Statement, Integration Evidence (Board Reports, Operational Risk in Project Plans), Stakeholder Inclusion Evidence", "sec": "PRINCIPLES — FOUNDATION OF RISK MANAGEMENT"}, {"i": "31000-F1", "t": "Leadership & Commitment", "d": "Demonstrate leadership commitment to risk management through policy, resources, accountability, and integration into organizational processes.", "s": ["Develop and approve risk management policy at executive level", "Allocate dedicated resources (staff, tools, budget) to risk management", "Define and communicate risk accountabilities across the organization", "Establish regular risk reporting to leadership", "Demonstrate leadership action on risk recommendations"], "q": ["Is a risk management policy approved by top management?", "Are adequate resources allocated to risk management?", "Are accountabilities for risk management clearly defined?", "Does leadership receive and act on risk reports?"], "e": "Risk Management Policy, Resource Allocation Evidence, Accountability Register, Leadership Risk Reports", "sec": "FRAMEWORK — INTEGRATING RISK MANAGEMENT"}, {"i": "31000-F2", "t": "Integration", "d": "Integrate risk management into all organizational functions, processes, and decision-making — not as a standalone activity.", "s": ["Add risk assessment to project initiation templates", "Train operational managers on risk identification and management", "Include risk review in strategic planning cycle", "Embed risk assessment in procurement and supplier ev
