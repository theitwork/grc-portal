// ─── IDB (EVIDENCE FILES) ───────────────────────────────────────────────────
const DB_NAME="itw-portal-db";
const DB_STORE_FILES="files";
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(DB_STORE_FILES))db.createObjectStore(DB_STORE_FILES);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function idbDelPrefix(prefix){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE_FILES,"readwrite");
    const store=tx.objectStore(DB_STORE_FILES);
    const req=store.openCursor();
    req.onsuccess=(e)=>{
      const cur=e.target.result;
      if(cur){if(String(cur.key||"").startsWith(prefix)) cur.delete();cur.continue();}
    };
    tx.oncomplete=()=>{db.close();resolve(true);};
    tx.onerror=()=>{db.close();reject(tx.error);};
  });
}

async function sha256Base64(text){
  const enc=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  const bytes=new Uint8Array(buf);
  let bin="";bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}

MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "4.3", "t": "Determining the scope of the ISMS", "d": "Draw a clear boundary around what your ISMS covers — which locations, systems, processes, data, and people are included (and what's excluded and why).", "s": ["Define which business processes, departments, and locations are in scope", "Identify which information assets, systems, and networks are covered", "Document any exclusions with clear justification", "Consider interfaces and dependencies with out-of-scope areas", "Publish as a formal ISMS Scope Statement", "Get top management approval"], "q": ["Is the ISMS scope clearly defined and documented?", "Does it consider internal/external issues (4.1) and stakeholder requirements (4.2)?", "Are exclusions justified?", "Is the scope approved by top management?"], "e": "ISMS Scope Statement (approved), Scope Diagram/Map, Exclusion Justifications", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "4.4", "t": "Information security management system", "d": "Build and run your ISMS — establish the processes, keep them running, and continuously make them better.", "s": ["Create an ISMS Manual describing the system", "Map all ISMS processes and their interactions", "Implement the Plan-Do-Check-Act (PDCA) cycle", "Ensure processes are resourced and operated", "Define metrics for effectiveness", "Establish mechanisms for continual improvement"], "q": ["Is the ISMS established, documented, and operational?", "Are ISMS processes mapped and interactions defined?", "Is the PDCA cycle being followed?", "Are there defined inputs/outputs for each process?"], "e": "ISMS Manual, Process Map, PDCA Documentation, Process Descriptions", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "5.1", "t": "Leadership and commitment", "d": "Top management must actively lead IS — not just sign off. They must allocate resources, set direction, and hold people accountable.", "s": ["Get formal executive sponsorship for the ISMS", "Include IS topics in board/executive meeting agendas regularly", "Allocate specific budget and headcount for IS", "Ensure IS policy aligns with business strategy", "Communicate the importance of IS to all staff", "Drive integration of ISMS requirements into business processes", "Participate in management reviews"], "q": ["Does top management actively participate in ISMS governance?", "Is there a dedicated IS budget?", "Are IS objectives aligned with business objectives?", "Does leadership communicate the importance of IS?"], "e": "Board/Management Meeting Minutes, Budget Records, Executive Communications, Management Review Attendance", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "5.2", "t": "Information security policy", "d": "Create a top-level IS policy that sets the direction — appropriate, committed to compliance and continual improvement.", "s": ["Draft an IS policy appropriate to the organization's purpose", "Include commitment to satisfy applicable requirements", "Include commitment to continual improvement", "Provide a framework for setting IS objectives", "Get top management approval (signature and date)", "Communicate to all employees and relevant parties", "Make it accessible (intranet, posters, onboarding)", "Review at planned intervals (at least annually)"], "q": ["Is there a formal, approved IS policy?", "Does it include commitments to compliance and continual improvement?", "Is it communicated to all employees?", "When was it last reviewed?"], "e": "IS Policy (signed, dated), Communication Evidence, Review Records, Acknowledgment Signatures", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "5.3", "t": "Organizational roles, responsibilities and authorities", "d": "Make sure everyone knows who does what in information security — from the CISO to the end user.", "s": ["Define the IS organizational structure", "Create a RACI matrix for all ISMS processes", "Document IS responsibilities in job descriptions", "Assign responsibility for ISMS performance reporting to top management", "Assign responsibility for ensuring ISMS conformity", "Communicate roles to all relevant parties"], "q": ["Are IS roles and responsibilities clearly defined?", "Is there a RACI matrix for ISMS activities?", "Do job descriptions include IS responsibilities?", "Is there a designated person responsible for ISMS conformity?"], "e": "RACI Matrix, Org Chart with IS roles, Job Descriptions, Appointment Letters", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "6.1.2", "t": "Information security risk assessment", "d": "Define HOW you assess risks (methodology), then DO it — identify what can go wrong, how likely, how bad.", "s": ["Define risk assessment methodology (qualitative, quantitative, or hybrid)", "Define risk criteria: acceptance levels, impact scales, likelihood scales", "Define a consistent risk rating matrix", "Identify assets, threats, and vulnerabilities", "Assess likelihood and impact for each risk scenario", "Calculate risk levels and compare to acceptance criteria", "Document in a Risk Register", "Get risk owners to accept or treat each risk", "Repeat at planned intervals and after significant changes"], "q": ["Is there a documented risk assessment methodology?", "Are risk criteria defined?", "Has a risk assessment been performed covering all in-scope assets?", "Are risk owners assigned?", "Is the risk register current (updated within 12 months)?"], "e": "Risk Assessment Methodology, Risk Criteria, Risk Register, Risk Assessment Report, Risk Owner Assignments", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "6.1.3", "t": "Information security risk treatment", "d": "For each unacceptable risk, decide what to do: mitigate (apply controls), accept, avoid, or transfer. Produce a Statement of Applicability.", "s": ["For each unacceptable risk, select treatment option", "Select controls from Annex A (or other sources)", "Produce the Statement of Applicability (SoA) — all 93 controls, selected/excluded with justification", "Create a Risk Treatment Plan with actions, owners, timelines", "Get risk owners to formally approve", "Implement controls per the plan", "Track implementation status"], "q": ["Is there a documented risk treatment plan?", "Is there a Statement of Applicability?", "Are exclusions justified in the SoA?", "Are treatment actions assigned to owners with deadlines?", "Has residual risk been formally accepted?"], "e": "Risk Treatment Plan, Statement of Applicability (SoA), Residual Risk Acceptance, Control Implementation Tracker", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "6.2", "t": "IS objectives and planning", "d": "Set specific, measurable IS goals. Know what you'll do, with what resources, by when, and how you'll measure success.", "s": ["Define IS objectives consistent with IS policy", "Make objectives SMART (Specific, Measurable, Achievable, Relevant, Time-bound)", "Set objectives at relevant functions and levels", "Define: what will be done, resources, who, when, how evaluated", "Communicate objectives", "Monitor and report progress"], "q": ["Are IS objectives documented and measurable?", "Are they consistent with the IS policy?", "Do they have owners, resources, and deadlines?", "Are they monitored and reported?"], "e": "IS Objectives Register, KPI Dashboard, Progress Reports", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "7.2", "t": "Competence", "d": "Make sure everyone who does IS work is qualified — through education, training, or experience. Fill gaps.", "s": ["Identify competence requirements for each IS role", "Create a competency matrix", "Assess current competence through skills assessments", "Identify gaps and create training plans", "Deliver training", "Evaluate training effectiveness", "Maintain records"], "q": ["Are competence requirements defined for IS roles?", "Is there a competency matrix?", "Are training records maintained?", "Is training effectiveness evaluated?"], "e": "Competency Matrix, Training Plan, Training Records, Certificates, Skills Assessments", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "7.3", "t": "Awareness", "d": "Everyone must know: the IS policy exists, how they contribute, and what happens if they don't comply.", "s": ["Design IS awareness programme covering policy, roles, consequences", "Deliver via multiple channels: onboarding, annual training, emails, posters, phishing sims", "Include role-specific awareness for high-risk roles", "Test awareness (quizzes, phishing tests)", "Track completion rates", "Refresh content regularly"], "q": ["Is there a formal security awareness programme?", "Does it cover policy, contributions, and non-conformity implications?", "Are completion rates tracked?", "Are phishing simulations conducted?"], "e": "Awareness Programme Plan, Completion Records, Phishing Simulation Results, Quiz Scores", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "7.5", "t": "Documented information", "d": "Control your documents and records — create properly, keep updated, protect them, ensure right people access right versions.", "s": ["Establish document control procedure", "Define records management procedure", "Create document register/master list", "Implement document management system", "Control external documents", "Ensure availability and protection"], "q": ["Is there a document control procedure?", "Are all ISMS documents version-controlled and approved?", "Is there a master document list?", "Are retention periods defined?"], "e": "Document Control Procedure, Records Management, Master Document Register, Approval Records", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "8.2", "t": "Information security risk assessment (periodic)", "d": "Don't just assess risk once — redo it at planned intervals and when significant changes occur.", "s": ["Schedule periodic risk assessments (at least annually)", "Define triggers for ad-hoc reassessment", "Conduct reassessments using same methodology", "Update risk register", "Update treatment plans as needed", "Report results to management"], "q": ["Have risk assessments been performed at planned intervals?", "Was the methodology used consistently?", "Were reassessments triggered by significant changes?", "Is the risk register current?"], "e": "Periodic Risk Assessment Reports, Updated Risk Register, Change-triggered Assessments", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "9.1", "t": "Monitoring, measurement, analysis and evaluation", "d": "Measure whether your ISMS is working — define metrics, collect data, analyze trends, evaluate performance.", "s": ["Define KPIs and metrics", "Define measurement methods, responsibilities, frequencies", "Implement monitoring tools and dashboards", "Analyze and evaluate results regularly", "Report to management", "Use results to drive improvement"], "q": ["Are IS metrics defined?", "Are metrics collected on schedule?", "Is there a monitoring dashboard?", "Are results analyzed for trends?", "Are results presented to management?"], "e": "IS KPI Register, Monitoring Dashboard, Performance Reports, Trend Analysis", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "9.2", "t": "Internal audit", "d": "Audit your own ISMS — check conformity to ISO 27001 and your own requirements. Is it effective?", "s": ["Establish audit programme covering all areas over a cycle", "Define criteria, scope, frequency, methods", "Select objective, impartial auditors", "Conduct audits per programme", "Report findings", "Take corrective action", "Verify effectiveness", "Retain records"], "q": ["Is there an internal audit programme?", "Are auditors independent and competent?", "Are reports produced with classified findings?", "Are corrective actions tracked to closure?"], "e": "Audit Programme, Audit Reports, Auditor Competence Records, Corrective Action Log", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "9.3", "t": "Management review", "d": "Top management formally reviews the ISMS — audit results, performance, incidents, risks, opportunities.", "s": ["Schedule reviews (minimum annually)", "Prepare inputs: audit results, metrics, incident trends, risk updates, feedback, improvement opportunities", "Conduct with top management present", "Document decisions and actions", "Track actions to completion"], "q": ["Are management reviews conducted at planned intervals?", "Does top management attend?", "Do reviews cover all required inputs?", "Are actions documented and tracked?"], "e": "Management Review Agenda, Minutes, Input Pack, Action Register, Attendance Records", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "10.1", "t": "Continual improvement", "d": "Always be improving — use audit findings, metrics, incidents, and reviews to make the ISMS better.", "s": ["Establish a Continual Improvement Register", "Feed from: audits, incidents, metrics, reviews, suggestions", "Prioritize improvements", "Implement with owners and timelines", "Measure effectiveness", "Report on improvement activities"], "q": ["Is there a continual improvement register?", "Are improvements sourced from multiple inputs?", "Are improvements tracked with owners?", "Can you demonstrate the ISMS has improved?"], "e": "Continual Improvement Register, Improvement Reports, Trend Analysis, Management Review Records", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "10.2", "t": "Nonconformity and corrective action", "d": "When something goes wrong, react immediately, find root cause, fix it, and make sure it doesn't recur.", "s": ["Establish NC and corrective action procedure", "React to control/correct the NC", "Evaluate need for eliminating the cause", "Conduct root cause analysis", "Implement corrective actions", "Review effectiveness", "Make ISMS changes if necessary", "Retain records"], "q": ["Is there a documented corrective action procedure?", "Are NCs logged and tracked?", "Is root cause analysis performed?", "Is effectiveness verified?", "Are records maintained?"], "e": "CAPA Procedure, NC Log, RCA Records, Corrective Action Records, Effectiveness Reviews", "sec": "ISMS MANAGEMENT SYSTEM CLAUSES (4–10)"}, {"i": "A.5.1", "t": "Policies for information security", "d": "Create a complete set of IS policies, get management approval, publish, communicate, and review regularly.", "s": ["Identify all needed policies (top-level + topic-specific)", "Draft using consistent templates", "Get management approval", "Communicate to all staff and relevant third parties", "Make easily accessible", "Review at planned intervals", "Maintain version control"], "q": ["Is there a comprehensive set of IS policies?", "Are they approved, communicated, accessible?", "Are they reviewed at planned intervals?"], "e": "IS Policy Set, Approval Records, Communication Evidence, Review Schedule", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.3", "t": "Segregation of duties", "d": "No single person should authorize AND execute a critical action. Separate conflicting duties.", "s": ["Identify processes needing SoD", "Create SoD matrix", "Implement technical controls (RBAC, approval workflows)", "Where separation impossible, implement compensating controls", "Review periodically"], "q": ["Is there a documented SoD matrix?", "Are conflicting duties separated?", "Are compensating controls in place where needed?"], "e": "SoD Matrix, Access Control Configs, Compensating Control Documentation", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.7", "t": "Threat intelligence", "d": "Actively gather threat information — feeds, ISACs, monitoring — and use it to improve defenses.", "s": ["Subscribe to threat intel feeds", "Join relevant ISACs or sharing groups", "Designate responsibility for analysis", "Integrate into risk assessments and security operations", "Brief management on significant threats"], "q": ["Is there a threat intelligence capability?", "Is it integrated into risk assessments and SIEM?", "Is management briefed on significant threats?"], "e": "Threat Intel Feeds, ISAC Membership, Threat Briefings, Updated SIEM Rules", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.9", "t": "Inventory of information and other associated assets", "d": "Know what you have — maintain a complete, accurate inventory of all information assets. Assign owners.", "s": ["Define what constitutes an 'asset'", "Identify all assets: data, systems, hardware, software, services", "Record in Asset Register with owner, classification, criticality", "Assign owner for every asset", "Keep current — automate discovery where possible"], "q": ["Is there a comprehensive asset inventory?", "Are all assets assigned an owner?", "Is the inventory accurate and current?"], "e": "Asset Register/Inventory, Ownership Records, CMDB, Discovery Scans", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.15", "t": "Access control", "d": "Control who accesses what — physically and logically. Least privilege. Need-to-know basis.", "s": ["Create Access Control Policy", "Implement least privilege principle", "Define access rules per system", "Implement RBAC where feasible", "Establish provisioning/de-provisioning procedures", "Conduct periodic access reviews (quarterly for privileged)"], "q": ["Is there an access control policy?", "Is least privilege applied?", "Are periodic access reviews conducted?", "Is there formal provisioning/de-provisioning?"], "e": "Access Control Policy, RBAC Design, Provisioning Procedures, Access Review Records", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.17", "t": "Authentication information", "d": "Control passwords, tokens, keys, certificates — from creation to expiry. MFA everywhere critical.", "s": ["Define authentication requirements", "Implement MFA for critical systems and remote access", "Prohibit credential sharing", "Implement secure password storage", "Train users on credential security", "Monitor for compromised credentials"], "q": ["Is MFA enforced for critical systems?", "Are passwords stored securely?", "Is there monitoring for compromised credentials?"], "e": "Password Policy, MFA Configuration, Credential Monitoring", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.24", "t": "Incident management planning", "d": "Be ready BEFORE an incident — plan, team, roles, drills. Practice makes prepared.", "s": ["Establish Incident Response Plan (IRP)", "Define severity classification", "Form Incident Response Team with defined roles", "Define escalation and communication procedures", "Establish evidence collection procedures", "Identify regulatory notification requirements", "Create playbooks for common scenarios", "Conduct tabletop exercises and drills regularly"], "q": ["Is there a documented IRP?", "Is an IRT formed with defined roles?", "Are exercises conducted regularly?", "Are regulatory notification requirements identified?"], "e": "IRP, IRT Charter, Escalation Matrix, Playbooks, Exercise Reports", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.5.30", "t": "ICT readiness for business continuity", "d": "Ensure IT systems recover within agreed timeframes — plan, implement, test, keep current.", "s": ["Conduct BIA to determine RTOs and RPOs", "Design recovery strategies", "Implement DR infrastructure", "Document DR plans", "Test at least annually", "Review and update after changes/tests"], "q": ["Is a BIA conducted with RTOs/RPOs?", "Are DR plans documented and tested annually?", "Do tests show recovery targets are achievable?"], "e": "BIA Report, DR Plans, DR Test Reports, Recovery Evidence", "sec": "ANNEX A.5 — ORGANIZATIONAL CONTROLS"}, {"i": "A.6.1", "t": "Screening", "d": "Check people before hiring — background, references, qualifications. Proportional to role sensitivity.", "s": ["Define screening requirements by role sensitivity", "Conduct pre-employment checks", "Screen contractors similarly", "Define re-screening triggers", "Maintain records"], "q": ["Are screening procedures defined?", "Is screening proportional to role sensitivity?", "Are contractors screened?", "Are records maintained?"], "e": "Screening Policy, Background Check Records, Third-Party Screening Evidence", "sec": "ANNEX A.6 — PEOPLE CONTROLS"}, {"i": "A.6.3", "t": "IS awareness, education and training", "d": "Train everyone — general awareness for all, specialized for IS roles. Keep it engaging and test it works.", "s": ["Develop training programme with role-based tracks", "General awareness annually minimum", "Role-specific: developers, admins, management", "Test knowledge (quizzes, phishing simulations)", "Track completion and results", "Update content based on threats"], "q": ["Is there a documented training programme?", "Is it mandatory with tracked completion?", "Are phishing simulations conducted?", "Is content refreshed regularly?"], "e": "Training Programme, Completion Records, Quiz Results, Phishing Reports", "sec": "ANNEX A.6 — PEOPLE CONTROLS"}, {"i": "A.7.1", "t": "Physical security perimeters", "d": "Define and protect physical boundaries of secure areas — walls, doors, badges, alarms.", "s": ["Identify areas requiring physical security", "Define perimeters with clear boundaries", "Implement physical barriers and entry controls", "Implement intruder detection", "Define visitor management", "Review regularly"], "q": ["Are secure areas identified with perimeters?", "Are entry controls in place?", "Is visitor management enforced?", "Are perimeters monitored?"], "e": "Physical Security Plan, Floor Plans, Access System Records, Visitor Logs", "sec": "ANNEX A.7 — PHYSICAL CONTROLS"}, {"i": "A.7.4", "t": "Physical security monitoring", "d": "Monitor premises continuously — CCTV, alarms, guards. Detect and respond to unauthorized access.", "s": ["Install CCTV at critical locations", "Implement alarm systems", "Define monitoring responsibilities", "Establish retention policies for footage", "Test systems regularly", "Ensure privacy law compliance"], "q": ["Is CCTV installed at critical locations?", "Are alarms monitored?", "Is footage retained adequately?", "Is surveillance privacy-compliant?"], "e": "CCTV Coverage Map, Alarm Documentation, Retention Policy, Test Records", "sec": "ANNEX A.7 — PHYSICAL CONTROLS"}, {"i": "A.8.1", "t": "User endpoint devices", "d": "Secure all laptops, phones, tablets — encryption, patching, MDM, screen locks, remote wipe.", "s": ["Create Endpoint Security Policy", "Deploy EDR/antivirus", "Enable full-disk encryption", "Implement MDM for mobile", "Enforce screen lock timeouts", "Enable remote wipe", "Centralize patching", "Control USB/removable media"], "q": ["Is EDR deployed on all endpoints?", "Is full-disk encryption enabled?", "Is MDM in place?", "Are endpoints patched regularly?"], "e": "Endpoint Policy, EDR Reports, Encryption Status, MDM Console, Patch Reports", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.2", "t": "Privileged access rights", "d": "Admin accounts are high-risk — separate from regular, log everything, review frequently.", "s": ["Identify all privileged accounts", "Implement PAM solution", "Enforce separate admin accounts", "Implement JIT/JEA principles", "Log all privileged activity", "Review quarterly", "Rotate credentials regularly"], "q": ["Are privileged accounts inventoried?", "Is a PAM solution in place?", "Is privileged access logged and monitored?", "Are reviews conducted quarterly?"], "e": "Privileged Account Inventory, PAM Tool, Access Logs, Quarterly Review Records", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.7", "t": "Protection against malware", "d": "Deploy anti-malware everywhere, keep signatures current, train users to recognize threats.", "s": ["Deploy EDR on all endpoints and servers", "Automate signature/behavioral updates", "Implement email security", "Enable web filtering", "Train users", "Monitor and respond to alerts"], "q": ["Is EDR deployed on all systems?", "Are signatures current?", "Is email security in place?", "Are users trained on malware recognition?"], "e": "EDR Reports, Signature Update Logs, Email Security Config, Training Records", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.8", "t": "Management of technical vulnerabilities", "d": "Scan regularly, assess severity, patch within defined SLAs. Critical=24-72hrs, High=7 days.", "s": ["Subscribe to vulnerability advisories", "Scan at least monthly (weekly for critical)", "Annual penetration testing", "Define patching SLAs by severity", "Track remediation to closure", "Report metrics to management"], "q": ["Is there a vulnerability management policy with SLAs?", "Are regular scans performed?", "Is pen testing conducted annually?", "Are remediation SLAs being met?"], "e": "Vuln Management Policy, Scan Reports, Pen Test Reports, Remediation Tracking", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.9", "t": "Configuration management", "d": "Define secure baselines for all systems. Harden. Track changes. Audit for drift.", "s": ["Define secure baselines (CIS Benchmarks)", "Harden during provisioning", "Maintain baselines in CMDB", "Monitor for drift", "Control changes via change management", "Automate where possible (IaC, GPO, Ansible)"], "q": ["Are secure baselines defined?", "Are systems hardened before deployment?", "Is drift monitored?", "Is configuration management automated?"], "e": "Configuration Baselines, Hardening Procedures, CMDB, Drift Detection Reports", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.13", "t": "Information backup", "d": "Back up critical data. Test restores. Protect backups from tampering. 3-2-1 rule.", "s": ["Create Backup Policy", "Implement automated backups for critical systems", "Follow 3-2-1 rule", "Encrypt backups", "Test restores quarterly", "Monitor backup success/failure", "Protect from ransomware (immutable/air-gapped)"], "q": ["Is there a backup policy?", "Are all critical systems backed up?", "Are restores tested regularly?", "Are backups protected from ransomware?"], "e": "Backup Policy, Backup Logs, Restore Test Reports, Encryption Config", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.15", "t": "Logging", "d": "Log everything security-relevant. Protect logs from tampering. Centralize in SIEM. Retain 12+ months.", "s": ["Define Logging Policy", "Enable logging on all systems", "Centralize in SIEM", "Protect log integrity", "Define retention periods (min 12 months)", "Synchronize time (NTP)", "Monitor log storage capacity"], "q": ["Is there a logging policy?", "Are logs centralized in a SIEM?", "Are logs protected from tampering?", "Is time synchronized across systems?"], "e": "Logging Policy, SIEM Config, Log Sources Inventory, NTP Config", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.16", "t": "Monitoring activities", "d": "Watch for anomalies — SIEM, IDS/IPS, alerts, SOC. Detect and respond in real time.", "s": ["Define what to monitor", "Implement SIEM with correlation rules", "Define alert thresholds and escalation", "Establish SOC or monitoring responsibility", "Create response playbooks", "Tune alerts to minimize false positives", "Review effectiveness"], "q": ["Is security monitoring in place?", "Are alerts configured and escalation defined?", "Is there a SOC or monitoring team?", "Are playbooks defined?"], "e": "SIEM Config, Alert Rules, SOC Procedures, Response Playbooks, Monitoring Reports", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.24", "t": "Use of cryptography", "d": "Define encryption rules — what, with what algorithms, how keys are managed through lifecycle.", "s": ["Create Cryptography Policy", "Define encryption requirements by classification", "Specify approved algorithms (AES-256, RSA-2048+, TLS 1.2+)", "Implement encryption at rest and in transit", "Establish key management procedures", "Review standards annually"], "q": ["Is there a cryptography policy?", "Are approved algorithms defined?", "Is encryption applied at rest and in transit?", "Are key management procedures documented?"], "e": "Cryptography Policy, Algorithm List, Encryption Config, Key Management Procedures", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.25", "t": "Secure development life cycle", "d": "Build security into software from day one — threat modeling, secure coding, review, testing.", "s": ["Define Secure SDLC framework", "Integrate security into each phase", "Threat model during design", "Train developers on secure coding", "Implement code reviews with security focus", "Perform SAST, DAST, SCA testing", "Security acceptance testing before release"], "q": ["Is there a Secure SDLC framework?", "Are threat models created?", "Are developers trained on secure coding?", "Is security testing (SAST/DAST/SCA) performed?"], "e": "Secure SDLC Policy, Threat Models, Secure Coding Guidelines, Security Test Reports", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}, {"i": "A.8.32", "t": "Change management", "d": "Control all system changes — assess, approve, test, implement, review. No unauthorized modifications.", "s": ["Establish Change Management Policy", "Define change types: standard, normal, emergency", "Require RFCs for all changes", "Assess impact and risk before approval", "Establish CAB for significant changes", "Require testing before production", "Conduct post-implementation reviews", "Maintain change schedule"], "q": ["Is there a change management policy?", "Are all changes logged via RFCs?", "Is there a CAB?", "Are changes tested before production?", "Are PIRs conducted?"], "e": "Change Policy, RFC Records, CAB Minutes, Test Evidence, PIR Reports, Change Schedule", "sec": "ANNEX A.8 — TECHNOLOGICAL CONTROLS"}], "ITIL 4": [{"i": "GMP-01", "t": "Strategy management", "d": "Define a clear IT strategy aligned with business goals. Know where you're going.", "s": ["Assess current IT capabilities and maturity", "Identify business goals and IT's enabling role", "Conduct gap analysis", "Define strategic initiatives and roadmap", "Allocate resources and budget", "Communicate to all stakeholders", "Review and adjust annua ing committee formed with ToR?", "Is a dedicated ISMS lead appointed?", "Is budget allocated?", "Are governance meetings held?", "Is the initiative communicated?"], "e": "Sponsorship Letter, Steering Committee ToR, Meeting Schedule, Budget Approval, ISMS Lead Appointment", "sec": "PHASE 1: FOUNDATION — Establish the management system framework"}, {"i": "Scope", "t": "ISMS Scope Definition", "d": "Draw the boundary — which offices, systems, processes, people. Be specific. Document exclusions.", "s": ["Identify business context", "Map information flows", "Identify critical processes relying on information", "Define boundaries: locations, networks, systems, teams, data", "Identify interfaces with out-of-scope areas", "Document exclusions with justification", "Get steering committee approval", "Publish scope statement"], "q": ["Is scope formally documented and approved?", "Are locations, systems, and processes identified?", "Are exclusions justified?", "Are interfaces with out-of-scope areas identified?"], "e": "Scope Statement, Scope Diagram, Information Flow Maps, Exclusion Justifications", "sec": "PHASE 1: FOUNDATION — Establish the management system framework"}, {"i": "Policy", "t": "IS Policy Framework", "d": "Create your IS constitution: top-level policy + topic-specific policies. This sets the rules everyone follows.", "s": ["Draft top-level IS policy (commitment, objectives, framework, accountability)", "Identify topic-specific policies (access control, acceptable use, mobile, remote, crypto, backup, supplier, incident, etc.)", "Use consistent template", "Get management approval", "Communicate (email, intranet, onboarding)", "Establish review schedule (annual minimum)", "Track acknowledgments"], "q": ["Is there a top-level IS policy approved by management?", "Is there a complete set of topic-specific policies?", "Are policies communicated and accessible?", "Have staff acknowledged them?", "Is there a review schedule?"], "e": "Top-Level IS Policy, Topic Policies, ntrols being implemented per the RTP?", "Are high-risk controls prioritized?", "Is each control tested after implementation?", "Is evidence documented?", "Is the SoA updated?", "Are control owners assigned?"], "e": "Control Implementation Plan, Test Evidence, Updated SoA, Control Documentation, Progress Report", "sec": "PHASE 2: IMPLEMENTATION — Deploy controls and operationalize"}, {"i": "Awareness", "t": "Security Awareness & Competence Programme", "d": "People are your biggest risk AND best defense. Train everyone. Make it engaging. Test it works.", "s": ["Develop layered programme:", "- All staff: annual general awareness", "- Managers: governance, risk, compliance", "- Technical: secure coding, hardening, IR", "- Executives: strategic risk, regulation", "Multiple methods: e-learning, workshops, phishing sims, newsletters", "Test knowledge (quizzes, phishing)", "Track 100% completion target", "Refresh content quarterly", "Measure effectiveness via incident metrics"], "q": ["Is there a formal awareness programme?", "Does it cover all levels with role-appropriate content?", "Are multiple delivery methods used?", "Is completion tracked (target: 100%)?", "Are phishing sims conducted?", "Is content refreshed regularly?"], "e": "Awareness Programme, Training Materials, Completion Records, Quiz Results, Phishing Reports", "sec": "PHASE 2: IMPLEMENTATION — Deploy controls and operationalize"}, {"i": "Incident", "t": "Incident Management Capability", "d": "Be ready to detect, respond, and recover from security incidents. Plan. Team. Practice.", "s": ["Create Incident Response Plan", "Define severity classification", "Form IRT with defined roles", "Define communication procedures", "Establish evidence collection procedures", "Identify regulatory notification requirements", "Create playbooks for common scenarios", "Conduct tabletop exercises quarterly", "Full simulations annually", "Review after every incident and exercise"], "q": ["Is there a documented IRP?", "Is an IRT formed?", "Are exercises conducted regularly?", "Are playbooks available?", "Are regulatory notifications identified?", "Is there a post-incident review process?"], "e": "IRP, IRT Charter, Severity Matrix, Playbooks, Exercise Records, Post-Incident Reviews", "sec": "PHASE 2: IMPLEMENTATION — Deploy controls and operationalize"}, {"i": "Documentation", "t": "ISMS Documentation Framework", "d": "Document everything required — and only what's useful. Good documentation proves your ISMS works.", "s": ["Define document hierarchy: policies → standards → procedures → guidelines → records", "Create document control procedure", "Create mandatory documents: scope, policy, risk methodology, register, SoA, RTP, objectives", "Create mandatory records: training, audits, reviews, corrective actions", "Implement document management system", "Define retention periods", "Ensure accessibility and protection", "Conduct periodic reviews"], "q": ["Is there a document control procedure?", "Are all mandatory documents created and current?", "Is a DMS in place?", "Are retention periods defined?", "Are documents version-controlled?", "Are they reviewed and updated?"], "e": "Document Control Procedure, Master Document List, DMS, Mandatory Docs/Records, Retention Schedule", "sec": "PHASE 2: IMPLEMENTATION — Deploy controls and operationalize"}, {"i": "Monitoring", "t": "Performance Monitoring & Measurement", "d": "Define IS metrics, collect data, prove the ISMS is working and find where it isn't.", "s": ["Define IS KPIs aligned with objectives", "(patch compliance %, MTTR, awareness completion %, access review %, vuln remediation time)", "Set targets and thresholds", "Implement automated data collection", "Create dashboards", "Analyze trends monthly", "Report to steering committee", "Use deviations to trigger corrective actions"], "q": ["Are IS KPIs defined and aligned with objectives?", "Is data collected automatically?", "Are dashboards available?", "Are metrics reviewed monthly?", "Are trends analyzed and acted upon?"], "e": "KPI Register, Monitoring Dashboards, Monthly Reports, Trend Analysis, Steering Committee Reports", "sec": "PHASE 3: MONITORING & ASSURANCE — Verify it works"}, {"i": "Internal Audit", "t": "Internal Audit Programme", "d": "Audit yourself before someone else does. Cover all clauses and controls. Be objective and thorough.", "s": ["Establish 12-24 month programme covering all areas", "Define methodology and procedures", "Train/hire competent, independent auditors", "Develop checklists per area", "Conduct audits per schedule", "Classify findings (major NC, minor NC, observation, OFI)", "Require corrective action plans", "Track to closure and verify effectiveness", "Report to management", "Maintain all records"], "q": ["Is there an audit programme covering all areas?", "Are auditors competent and independent?", "Are audits on schedule?", "Are findings classified and reported?", "Are corrective actions tracked and verified?", "Are results reported to management?"], "e": "Audit Programme, Procedures, Auditor Records, Audit Reports, Finding Tracker, CAPA Records", "sec": "PHASE 3: MONITORING & ASSURANCE — Verify it works"}, {"i": "Mgmt Review", "t": "Management Review Process", "d": "Top management formally reviews the ISMS. Required — not optional. Proves governance works.", "s": ["Schedule reviews (minimum annually, recommended biannually)", "Prepare inputs: previous actions, changes, performance, incidents, audits, feedback, risks, improvements", "Conduct with top management present", "Document outputs: improvement decisions, resource needs, changes", "Track actions to completion"], "q": ["Are reviews scheduled and held?", "Does top management attend?", "Are all required inputs prepared?", "Are decisions documented?", "Are actions tracked to completion?"], "e": "Review Schedule, Input Packs, Meeting Minutes, Action Register, Attendance Records", "sec": "PHASE 3: MONITORING & ASSURANCE — Verify it works"}, {"i": "CAPA", "t": "Nonconformity & Corrective Action", "d": "When something doesn't conform, fix it properly: contain, root cause, correct, verify.", "s": ["Define CAPA procedure", "Log NCs from: audits, incidents, complaints, monitoring, reviews", "Immediate correction to contain impact", "Root cause analysis (5 Whys, fishbone, Pareto)", "Define corrective actions", "Assign owners and deadlines", "Implement", "Verify effectiveness", "Close only when verified", "Analyze trends for systemic issues"], "q": ["Is there a CAPA procedure?", "Are NCs logged from all sources?", "Is RCA performed?", "Are corrective actions assigned with deadlines?", "Is effectiveness verified before closure?", "Are trends analyzed?"], "e": "CAPA Procedure, NC Register, RCA Records, Corrective Action Records, Effectiveness Verification", "sec": "PHASE 4: IMPROVEMENT — Close gaps and mature the ISMS"}, {"i": "Improvement", "t": "Continual Improvement Programme", "d": "The ISMS must get better over time. Use everything learned to drive measurable improvements.", "s": ["Establish Continual Improvement Register", "Source from: audits, reviews, incidents, metrics, suggestions, benchmarking", "Evaluate and prioritize (risk-based)", "Develop business cases for significant changes", "Implement with owners and timelines", "Measure outcomes", "Report to steering committee", "Celebrate and communicate successes"], "q": ["Is there a CI register?", "Are improvements from multiple inputs?", "Are they prioritized and tracked?", "Is effectiveness measured?", "Can you demonstrate improvement over time?"], "e": "CI Register, Improvement Plans, Before/After Metrics, Improvement Reports", "sec": "PHASE 4: IMPROVEMENT — Close gaps and mature the ISMS"}, {"i": "Certification", "t": "Certification Readiness (ISO 27001)", "d": "Preparing for the external audit: Stage 1 = documentation, Stage 2 = implementation. Fix major NCs before cert.", "s": ["Conduct certification readiness gap assessment", "Address all gaps", "Ensure all mandatory documentation is complete", "Complete at least one internal audit cycle", "Complete at least one management review", "Close corrective actions from audits", "Select accredited certification body", "Stage 1: documentation review — address findings", "Stage 2: on-site implementation — address NCs", "Achieve certification", "Plan surveillance (annual) and recertification (3 years)"], "q": ["Is gap assessment completed with gaps addressed?", "Is all mandatory documentation complete?", "Has at least one internal audit been performed?", "Has at least one management review been conducted?", "Are all CAPAs closed?", "Is a certification body selected?"], "e": "Gap Assessment Report, Documentation Checklist, Audit Records, Review Records, CAPA Closure, CB Contract", "sec": "PHASE 4: IMPROVEMENT — Close gaps and mature the ISMS"}], "NIST CSF 2.0": [{"i": "GV.OC-01", "t": "Organizational Context", "d": "Understand the mission, stakeholder expectations, legal obligations and strategic priorities that shape your cybersecurity program.", "s": ["Identify and document organizational mission and objectives", "Map applicable laws, regulations, and contractual obligations", "Identify key stakeholders and their cybersecurity expectations", "Document organizational risk tolerance and priorities", "Review and update annually or when context changes"], "q": ["Is the organizational mission documented?", "Are legal/regulatory requirements identified?", "Are stakeholder cybersecurity expectations recorded?", "Is context reviewed annually?"], "e": "Mission Statement, Regulatory Register, Stakeholder Expectations Log", "sec": "GV — GOVERN"}, {"i": "GV.RM-01", "t": "Risk Management Strategy", "d": "Establish, communicate, and monitor a risk management strategy including risk appetite and risk tolerance thresholds.", "s": ["Define risk appetite and tolerance levels", "Document risk management strategy", "Communicate strategy to leadership and relevant staff", "Align strategy with organizational objectives", "Review and update strategy annually"], "q": ["Is a risk management strategy documented and approved?", "Is risk appetite defined and communicated?", "Are risk tolerance thresholds set per asset type?", "Is the strategy reviewed periodically?"], "e": "Risk Management Strategy Document, Risk Appetite Statement, Risk Tolerance Thresholds", "sec": "GV — GOVERN"}, {"i": "GV.PO-01", "t": "Policy", "d": "Establish cybersecurity policies that are approved by leadership, communicated, enforced, and regularly reviewed.", "s": ["Develop or review top-level cybersecurity policy", "Identify topic-specific policies needed", "Get leadership approval on all policies", "Communicate policies to all staff", "Establish policy review cycle (annual minimum)"], "q": ["Are cybersecurity policies documented and approved?", "Are policies communicated to all staff?", "Is there an enforcement mechanism?", "Are policies reviewed annually?"], "e": "Cybersecurity Policy Suite, Approval Records, Communication Log, Review Schedule", "sec": "GV — GOVERN"}, {"i": "ID.AM-01", "t": "Asset Management", "d": "Maintain an inventory of all hardware, software, data, and people that need to be managed as part of your cybersecurity program.", "s": ["Inventory all hardware assets (servers, endpoints, network devices)", "Inventory all software and licensed applications", "Map data flows and classify data by sensitivity", "Assign owners to all critical assets", "Establish regular inventory review process"], "q": ["Is there a complete hardware asset inventory?", "Is software inventory maintained?", "Are data assets classified?", "Is the inventory reviewed regularly?"], "e": "Hardware Inventory, Software Inventory, Data Classification Register, Asset Owner Assignments", "sec": "ID — IDENTIFY"}, {"i": "ID.RA-01", "t": "Risk Assessment", "d": "Identify, analyze, and prioritize cybersecurity risks to the organization using a consistent, repeatable methodology.", "s": ["Define risk assessment methodology (likelihood × impact)", "Identify threat sources and threat events", "Identify vulnerabilities in systems and processes", "Assess likelihood and impact for each risk", "Prioritize risks and document in risk register", "Schedule regular reassessments"], "q": ["Is a formal risk assessment process defined?", "Are threats and vulnerabilities identified?", "Is likelihood and impact assessed?", "Are risks prioritized and tracked?", "Is the assessment repeated periodically?"], "e": "Risk Assessment Methodology, Risk Register, Threat Library, Risk Prioritization Matrix", "sec": "ID — IDENTIFY"}, {"i": "PR.AA-01", "t": "Identity Management & Access Control", "d": "Manage identities, credentials, and access to systems using least-privilege principles and strong authentication.", "s": ["Implement role-based access control (RBAC)", "Enforce MFA for all privileged and remote accounts", "Conduct quarterly access reviews", "Automate account deprovisioning on termination", "Audit privileged account usage"], "q": ["Are user accounts managed with least privilege?", "Is MFA enforced for privileged and remote access?", "Are access reviews conducted periodically?", "Are terminated user accounts promptly disabled?"], "e": "IAM Policy, User Account Register, Access Review Records, MFA Configuration Evidence", "sec": "PR — PROTECT"}, {"i": "PR.DS-01", "t": "Data Security", "d": "Protect data at rest and in transit using encryption, classification, and access controls aligned to sensitivity level.", "s": ["Classify and label all organizational data", "Implement encryption for data at rest (AES-256)", "Enforce TLS 1.2+ for all data in transit", "Deploy DLP controls for sensitive data categories", "Ensure backup data is encrypted", "Test data recovery quarterly"], "q": ["Is sensitive data encrypted at rest?", "Is data encrypted in transit (TLS 1.2+)?", "Is data classified and labeled?", "Are DLP controls in place?", "Are backups encrypted?"], "e": "Encryption Standards Document, Data Classification Policy, DLP Configuration, Backup Encryption Proof", "sec": "PR — PROTECT"}, {"i": "PR.PS-01", "t": "Platform Security", "d": "Harden systems and platforms using secure configurations, patch management, and removal of unnecessary services.", "s": ["Define hardening baselines (CIS Benchmarks recommended)", "Apply baselines to all endpoints, servers, and network devices", "Implement automated patch management", "Disable unnecessary services and ports", "Monitor for configuration drift using SIEM/EDR"], "q": ["Are hardening baselines applied to all systems?", "Is patch management timely (critical patches ≤30 days)?", "Are unnecessary services/ports disabled?", "Are configurations monitored for drift?"], "e": "Hardening Baselines, Patch Management Reports, Vulnerability Scan Results, Configuration Audit Logs", "sec": "PR — PROTECT"}, {"i": "DE.CM-01", "t": "Continuous Monitoring", "d": "Monitor networks, systems, and activities continuously to detect anomalies, threats, and policy violations in near real-time.", "s": ["Deploy SIEM or centralized log management", "Define log sources (endpoints, network, cloud, apps)", "Establish alert rules for critical threat scenarios", "Tune alerts to reduce false positives", "Define alert triage SLAs and assign ownership", "Review monitoring coverage quarterly"], "q": ["Is a SIEM or log management platform deployed?", "Are alerts tuned and reviewed?", "Are network flows monitored?", "Is endpoint activity logged?", "Are alerts actioned within defined SLAs?"], "e": "SIEM Deployment Evidence, Alert Runbooks, Monitoring Coverage Map, Incident Ticket Logs", "sec": "DE — DETECT"}, {"i": "RS.MA-01", "t": "Incident Management", "d": "Establish a formal incident response capability including plans, roles, communication procedures, and lessons-learned processes.", "s": ["Develop formal Incident Response Plan (IRP)", "Define IR roles: Incident Commander, Technical Lead, Communications", "Establish escalation and notification procedures", "Conduct tabletop exercise or simulation annually", "Document and implement lessons learned after each incident"], "q": ["Is there a documented incident response plan?", "Are roles and responsibilities defined?", "Has the plan been tested in the last 12 months?", "Are lessons learned documented and acted on?"], "e": "Incident Response Plan, IR Roles & Responsibilities, Tabletop Exercise Records, Lessons Learned Register", "sec": "RS — RESPOND"}, {"i": "RC.RP-01", "t": "Incident Recovery", "d": "Execute recovery activities to restore systems and services following a cybersecurity incident, with clear prioritization and validation.", "s": ["Define RTO and RPO for all critical systems", "Document recovery procedures per system", "Test backup restoration quarterly", "Develop or update Disaster Recovery Plan (DRP)", "Validate system integrity after each recovery", "Debrief and document improvements post-incident"], "q": ["Are recovery procedures documented per system/service?", "Are recovery time objectives (RTO) defined?", "Are backups tested regularly?", "Is there a disaster recovery plan?", "Are recovery activities validated post-incident?"], "e": "Recovery Procedures, RTO/RPO Definitions, Backup Test Records, Disaster Recovery Plan, Post-Recovery Validation Reports", "sec": "RC — RECOVER"}], "SOC 2": [{"i": "CC1.1", "t": "COSO Principles — Integrity & Ethics", "d": "Demonstrate commitment to integrity and ethical values through policies, tone at the top, and accountability mechanisms.", "s": ["Draft and approve Code of Conduct", "Require annual staff acknowledgment", "Establish ethics reporting mechanism (hotline or form)", "Track and respond to reported violations", "Leadership communicates tone at the top regularly"], "q": ["Is a Code of Conduct in place and acknowledged by staff?", "Are ethical violations tracked and acted upon?", "Does leadership model expected behaviors?"], "e": "Code of Conduct, Acknowledgment Records, Ethics Hotline Logs, HR Disciplinary Records", "sec": "CC1 — CONTROL ENVIRONMENT"}, {"i": "CC1.2", "t": "Board Oversight", "d": "Ensure the board or equivalent governance body exercises oversight of the organization's internal control environment.", "s": ["Establish or formalize board/governance committee", "Define frequency of control reporting to governance", "Present SOC 2 readiness status to governance quarterly", "Document governance actions on control findings"], "q": ["Does a board or steering committee exist?", "Are control reports presented to governance?", "Are findings and deficiencies actioned?"], "e": "Board/Steering Committee Charter, Meeting Minutes, Control Reporting Package", "sec": "CC1 — CONTROL ENVIRONMENT"}, {"i": "CC6.1", "t": "Logical Access Controls", "d": "Restrict logical access to systems and data using authentication, authorization, and least-privilege principles.", "s": ["Enforce MFA on all production and admin systems", "Implement formal access provisioning and deprovisioning workflow", "Eliminate shared/generic accounts", "Conduct quarterly privileged access reviews", "Log and monitor all privileged access activity"], "q": ["Is MFA enforced on all production systems?", "Are access rights provisioned via formal request process?", "Are privilege access rights reviewed quarterly?", "Are shared/generic accounts eliminated?"], "e": "Access Control Policy, Provisioning Workflow, Quarterly Access Review Reports, MFA Configuration", "sec": "CC6 — LOGICAL & PHYSICAL ACCESS"}, {"i": "CC6.6", "t": "Network & Boundary Protection", "d": "Protect system boundaries by restricting network access, controlling data flows, and monitoring for unauthorized connections.", "s": ["Document and review firewall rules quarterly", "Implement network segmentation for sensitive systems", "Enforce VPN or Zero Trust for all remote access", "Deploy IDS/IPS at network boundaries", "Monitor and alert on unauthorized connection attempts"], "q": ["Are firewalls configured and rules reviewed?", "Is network segmentation implemented?", "Are unauthorized connections detected and blocked?", "Is remote access secured (VPN/Zero Trust)?"], "e": "Firewall Rule Reviews, Network Diagram, Segmentation Evidence, VPN/ZTNA Configuration", "sec": "CC6 — LOGICAL & PHYSICAL ACCESS"}, {"i": "CC7.1", "t": "Vulnerability Management", "d": "Detect, evaluate, and remediate vulnerabilities in infrastructure and applications in a timely and risk-prioritized manner.", "s": ["Deploy vulnerability scanning tool (e.g., Nessus, OpenVAS)", "Schedule quarterly scans — monthly for internet-facing systems", "Define SLAs: Critical ≤30 days, High ≤60 days, Medium ≤90 days", "Track remediation to closure in ticketing system", "Report vulnerability posture to management monthly"], "q": ["Are vulnerability scans conducted at least quarterly?", "Are critical vulnerabilities remediated within 30 days?", "Is a patch management process documented?", "Are scan results tracked to closure?"], "e": "Vulnerability Scan Reports, Patch Management Policy, Remediation Tracking Log, Scan Tool Configuration", "sec": "CC7 — SYSTEM OPERATIONS"}, {"i": "CC7.2", "t": "Incident Monitoring & Response", "d": "Monitor systems for security events, investigate anomalies, and respond to incidents within defined timeframes.", "s": ["Deploy and configure SIEM for security event monitoring", "Define incident severity classification (P1–P4)", "Document response procedures per severity level", "Track all incidents from detection to closure", "Review and report on SLA compliance monthly"], "q": ["Are security events logged and monitored 24/7 or with defined coverage?", "Is there a documented incident response process?", "Are incidents classified by severity?", "Are response time SLAs met and measured?"], "e": "SIEM/Monitoring Tool Evidence, IRP, Incident Register, SLA Compliance Reports", "sec": "CC7 — SYSTEM OPERATIONS"}, {"i": "A1.1", "t": "Availability Commitments", "d": "Define, monitor, and meet availability commitments for systems. Identify threats to availability and implement controls to address them.", "s": ["Define SLA/uptime targets per critical service", "Deploy uptime monitoring (e.g., Uptime Kuma, Datadog)", "Identify availability threats (DDoS, hardware failure, etc.)", "Implement redundancy and failover for critical systems", "Report availability metrics to management monthly"], "q": ["Are SLAs/uptime targets defined per service?", "Is uptime monitored and reported?", "Are availability threats identified and mitigated?", "Are outages tracked and root-caused?"], "e": "SLA Definitions, Uptime Monitoring Reports, Availability Risk Assessment, Incident & Outage Log", "sec": "A1 — AVAILABILITY"}, {"i": "C1.1", "t": "Confidential Information Identification & Protection", "d": "Identify confidential information and protect it through classification, access controls, encryption, and secure disposal.", "s": ["Define and document confidential information categories", "Apply classification labels to confidential data", "Restrict access to confidential data using RBAC", "Encrypt confidential data at rest and in transit", "Implement and verify secure disposal procedures"], "q": ["Is confidential information classified and labeled?", "Are access controls applied to confidential data?", "Is confidential data encrypted at rest and in transit?", "Is secure disposal documented and verified?"], "e": "Data Classification Policy, Classification Labels, Encryption Configuration, Secure Disposal Records", "sec": "C1 — CONFIDENTIALITY"}, {"i": "P1.1", "t": "Privacy Notice & Consent", "d": "Provide clear notice to individuals about what personal information is collected, how it is used, and obtain valid consent where required.", "s": ["Inventory all personal information collection points", "Draft or update privacy notice to cover all collection", "Publish privacy notice on website and in applications", "Implement consent capture mechanism", "Maintain consent records with timestamps and version"], "q": ["Is a privacy notice published and accessible?", "Does it cover all data collection activities?", "Is consent obtained where legally required?", "Is consent recorded and auditable?"], "e": "Privacy Notice/Policy, Consent Records, Data Collection Inventory, Privacy Review Minutes", "sec": "P — PRIVACY"}], "CIS v8": [{"i": "CIS-01", "t": "Inventory & Control of Enterprise Assets", "d": "Actively manage all enterprise hardware assets so unauthorized devices are identified and prevented from accessing the network.", "s": ["Deploy active asset discovery tool (e.g., Nmap, Lansweeper)", "Build and maintain hardware asset inventory", "Integrate with DHCP/DNS for continuous detection", "Define process to investigate and remediate unauthorized assets", "Review and reconcile inventory monthly"], "q": ["Is there an up-to-date inventory of all hardware assets?", "Is DHCP logging or network scanning used to detect unknowns?", "Are unauthorized devices blocked from network access?", "Is the inventory reviewed monthly?"], "e": "Hardware Asset Inventory, Network Scan Results, DHCP/CMDB Logs, Unauthorized Device Alerts", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-02", "t": "Inventory & Control of Software Assets", "d": "Actively manage all software installed on enterprise assets; only allow authorized software to execute (allowlisting).", "s": ["Build authorized software inventory", "Scan endpoints for installed software regularly", "Implement application allowlisting or control (Windows Defender WDAC, AppLocker)", "Define process to remove or quarantine unauthorized software", "Review authorized software list quarterly"], "q": ["Is there an authorized software list?", "Is unauthorized software detected and removed?", "Is software allowlisting or application control enforced?", "Are OS and applications inventoried and up to date?"], "e": "Software Asset Inventory, Authorized Software List, Application Control Policy, Scan Reports", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-03", "t": "Data Protection", "d": "Develop processes and technical controls to identify, classify, securely handle, retain, and dispose of data.", "s": ["Define data classification levels (Public, Internal, Confidential, Restricted)", "Classify and label existing data stores", "Implement encryption for sensitive data at rest and in transit", "Define and enforce data retention schedules", "Implement DLP tools", "Document and audit data disposal procedures"], "q": ["Is data classified by sensitivity?", "Is sensitive data encrypted at rest and in transit?", "Are data retention policies defined and enforced?", "Is secure disposal documented?", "Are DLP controls in place?"], "e": "Data Classification Policy, Encryption Configuration, Retention Schedule, Disposal Records, DLP Alerts", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-04", "t": "Secure Configuration of Enterprise Assets & Software", "d": "Establish and maintain secure configurations for hardware and software to reduce attack surface.", "s": ["Adopt CIS Benchmarks as hardening baseline", "Create golden/hardened images for all OS types in use", "Scan all systems for configuration compliance weekly", "Remediate deviations within defined SLAs", "Review and update baselines annually or when major patches release"], "q": ["Are CIS Benchmarks or equivalent baselines applied?", "Is configuration compliance monitored?", "Are new systems built from a secure baseline image?", "Is configuration drift detected and remediated?"], "e": "Hardening Baselines, Compliance Scan Results, Golden Image Evidence, Drift Remediation Records", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-05", "t": "Account Management", "d": "Use processes and tools to assign and manage authorization to credentials for user accounts, including admin accounts.", "s": ["Inventory all user accounts (AD, cloud, SaaS)", "Separate admin accounts from standard user accounts", "Enforce password policies (length, complexity, no reuse)", "Disable accounts inactive for >30 days", "Inventory and control all service accounts", "Review account inventory monthly"], "q": ["Are all accounts inventoried?", "Are admin accounts separate from standard accounts?", "Are dormant/unused accounts disabled?", "Are service accounts inventoried and controlled?"], "e": "Account Inventory, Admin Account Register, Dormant Account Review, Service Account Register", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-06", "t": "Access Control Management", "d": "Use processes and tools to create, assign, manage, and revoke access credentials based on least privilege.", "s": ["Define and implement least-privilege access model", "Enforce MFA on all remote, privileged, and email accounts", "Implement automated deprovisioning on HR termination trigger", "Conduct access reviews quarterly", "Log and audit privileged access sessions"], "q": ["Is access provisioned based on least privilege?", "Is MFA enforced for all remote and admin access?", "Are access rights reviewed periodically?", "Is access revoked promptly upon termination?"], "e": "Access Control Policy, Provisioning Records, MFA Enrollment Report, Termination Checklist, Access Review", "sec": "IG1 — BASIC CYBER HYGIENE (Implementation Group 1)"}, {"i": "CIS-07", "t": "Continuous Vulnerability Management", "d": "Continuously acquire, assess, and take action on vulnerability information to identify and remediate vulnerabilities.", "s": ["Deploy vulnerability scanner (Nessus, Qualys, or OpenVAS)", "Schedule automated weekly scans for all assets", "Define remediation SLAs by severity", "Track all vulnerabilities to remediation in ticketing system", "Report vulnerability posture to management monthly"], "q": ["Are vulnerability scans run at least weekly?", "Are critical vulnerabilities remediated within 30 days?", "Is there a patching SLA policy?", "Are scan results tracked to closure?"], "e": "Scan Schedule, Vulnerability Reports, Patch SLA Policy, Remediation Tracking", "sec": "IG2 — FOUNDATIONAL SECURITY (Implementation Group 2)"}, {"i": "CIS-08", "t": "Audit Log Management", "d": "Collect, alert, review, and retain audit logs of events that could help detect, understand, or recover from an attack.", "s": ["Define required log sources (endpoints, servers, firewalls, cloud, apps)", "Deploy centralized log management (SIEM)", "Define log retention: 90 days hot, 12 months archive", "Protect logs from unauthorized modification", "Review logs daily or via automated alerting"], "q": ["Are critical systems sending logs to a central platform?", "Is log retention defined (minimum 90 days online, 1 year archived)?", "Are logs reviewed for anomalies?", "Are logs protected from tampering?"], "e": "Log Management Platform, Log Source Inventory, Retention Policy, Anomaly Alert Records, Tamper-Evidence Config", "sec": "IG2 — FOUNDATIONAL SECURITY (Implementation Group 2)"}, {"i": "CIS-11", "t": "Data Recovery", "d": "Establish and maintain data recovery practices to ensure recovery of data to a known, trusted state after a disruption.", "s": ["Inventory all critical data assets requiring backup", "Configure automated daily backups for all critical systems", "Implement immutable or offline backup copies (3-2-1 rule)", "Define RTO and RPO per system", "Test backup restoration quarterly", "Document and review results"], "q": ["Are all critical data assets backed up?", "Are backups tested quarterly?", "Are backups stored offline or immutably?", "Are RPO/RTO defined and validated?"], "e": "Backup Policy, Backup Job Logs, Recovery Test Records, RPO/RTO Definitions, Immutable Backup Config", "sec": "IG2 — FOUNDATIONAL SECURITY (Implementation Group 2)"}, {"i": "CIS-13", "t": "Network Monitoring & Defense", "d": "Operate processes and tooling to establish and maintain comprehensive network monitoring and defense.", "s": ["Deploy IDS/IPS at internet boundary and key internal segments", "Establish network traffic baselines", "Configure alerts for anomalous traffic patterns", "Monitor east-west (lateral) traffic flows", "Review network alerts daily via SIEM"], "q": ["Is network traffic monitored for anomalies?", "Is IDS/IPS deployed at network perimeter and internally?", "Are network baselines established?", "Are east-west traffic flows monitored?"], "e": "IDS/IPS Configuration, Network Baseline, Traffic Analysis Reports, Anomaly Alert Logs", "sec": "IG3 — ADVANCED SECURITY (Implementation Group 3)"}, {"i": "CIS-17", "t": "Incident Response Management", "d": "Establish a program to develop and maintain an incident response capability to prepare for, detect, contain, and recover from incidents.", "s": ["Develop or update Incident Response Plan (IRP)", "Assign IR roles (Incident Commander, Technical, Communications, Legal)", "Train all relevant staff on IR procedures", "Conduct annual tabletop or simulation exercise", "Track and implement lessons learned after incidents"], "q": ["Is an IRP documented and approved?", "Are IR roles and responsibilities assigned?", "Are staff trained on IR procedures?", "Is the plan exercised annually?", "Are lessons learned documented?"], "e": "Incident Response Plan, Role Assignments, Training Records, Exercise Reports, Lessons Learned Log", "sec": "IG3 — ADVANCED SECURITY (Implementation Group 3)"}, {"i": "CIS-18", "t": "Penetration Testing", "d": "Test the effectiveness of your defenses by simulating attacker techniques against your systems and processes.", "s": ["Define scope and objectives for annual pen test", "Engage qualified internal or external pen tester", "Conduct network penetration test", "Conduct web/application penetration test", "Remediate critical and high findings within 30 days", "Report results to leadership and track remediation"], "q": ["Is penetration testing conducted at least annually?", "Are both network and application layers tested?", "Are findings remediated within defined timelines?", "Are results reported to leadership?"], "e": "Penetration Test Reports, Scope Agreement, Remediation Evidence, Management Briefing", "sec": "IG3 — ADVANCED SECURITY (Implementation Group 3)"}], "NIST SP 800-53": [{"i": "AC-1", "t": "Policy and Procedures", "d": "Develop, document, and disseminate an access control policy and procedures that are reviewed and updated regularly.", "s": ["Draft access control policy covering least privilege, separation of duties, MFA", "Document procedures for account provisioning, access review, deprovisioning", "Get senior management approval", "Distribute to all relevant staff", "Schedule annual policy review"], "q": ["Is an access control policy documented and approved?", "Are procedures for implementing the policy documented?", "Is the policy reviewed at least annually?", "Is the policy communicated to relevant staff?"], "e": "Access Control Policy, Procedures Document, Approval Record, Review Schedule, Distribution List", "sec": "AC — ACCESS CONTROL"}, {"i": "AC-2", "t": "Account Management", "d": "Manage information system accounts including their establishment, activation, modification, review, disabling, and removal.", "s": ["Define account types (user, admin, service, shared)", "Implement formal account creation workflow with manager approval", "Configure automatic account expiry for temporary accounts", "Conduct account reviews every 90 days", "Define and automate account deactivation on termination (≤24 hours)"], "q": ["Are account creation and removal procedures followed?", "Are accounts reviewed periodically?", "Are shared accounts prohibited or controlled?", "Are accounts disabled within 24 hours of termination?"], "e": "Account Management Procedures, Account Lifecycle Records, Periodic Review Reports, Termination Checklist", "sec": "AC — ACCESS CONTROL"}, {"i": "AU-2", "t": "Event Logging", "d": "Identify the types of events that the system is capable of logging in support of the audit function.", "s": ["Define
