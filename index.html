    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];if(!st)continue;
      const noAnswers=st.assessmentAnswers.filter(a=>a===false);
      if(noAnswers.length>0||st.status==="Non-Compliant")
        gaps.push({fw,item,st,noCount:noAnswers.length,totalQ:item.q.length,
          failedQs:item.q.filter((q,i)=>st.assessmentAnswers[i]===false)});
    }
    return gaps.sort((a,b)=>{const pO={"Critical":0,"High":1,"Medium":2,"Low":3};return(pO[a.st.priority]||3)-(pO[b.st.priority]||3)});
  },[userState]);

    if(!userState)return{};
    const owners={};
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];if(!st||!st.owner)continue;
      if(!owners[st.owner])owners[st.owner]={total:0,compliant:0,overdue:0};

      if(st.status==="Compliant")owners[st.owner].compliant++;
      if(st.targetDate&&st.status!=="Compliant"&&new Date(st.targetDate)<new Date(today()))owners[st.owner].overdue++;

        items.push({fw,item,st,pVal:pO[st.priority]||3});
      }

      const chunk=items.slice(i*perSprint,(i+1)*perSprint);

    {id:"gaps",label:"Gap Analysis",icon:IC.alert},

    {id:"scorecard",label:"Scorecard",icon:IC.clip},

                      <span style={{color:NOTIF_TYPES[n.type]||'#666',flexShrink:0,marginTop:1}}>{n.type==='overdue'?IC.alert:n.type==='evidence'?IC.file:n.type==='approval'?IC.shield2:IC.alert}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:n.read?'var(--text-secondary)':'var(--text-primary)',lineHeight:1.4}}>{n.message}</div>

                      </div>
                      {!n.read&&<span style={{width:6,height:6,borderRadius:'50%',background:'#3b82f6',flexShrink:0,marginTop:4}}/>}
                    </div>

                </div>
              </div>

                  <button key={r} onClick={()=>{setRole(r);setShowRoleSwitcher(false);}} style={{display:'flex',width:'100%',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:5,border:'none',background:role===r?'var(--bg-accent)':'transparent',cursor:'pointer',fontSize:11,fontWeight:role===r?700:400,color:role===r?'var(--brand-yellow-dark)':'var(--text-secondary)'}}>

              {IC.demo} Load Sample
            </button>

          {isDemoMode&&(
            <button onClick={exitDemoMode} style={{...tabBtn(false),background:'#f59e0b',color:'#fff',fontWeight:700,border:'none',fontSize:10,gap:4}}>

            </button>

          <button onClick={logout} style={{...tabBtn(false),background:'var(--bg-input)',border:'1px solid var(--border)'}} title="Logout">Logout</button>
        </div>
      </div>

      {/* ── BRANDING PANEL ───────────────────────────────────────────────── */}
      {showBranding&&(
        <div className="no-print" style={{background:'var(--bg-accent)',borderBottom:'1px solid var(--border)',padding:'12px 24px'}}>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>

      {showNavDemo&&(
        <div className="no-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div className="card" style={{maxWidth:580,width:"100%",padding:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontWeight:800,fontSize:15}}>👋 Welcome to THE IT WORK Compliance Portal</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Your enterprise GRC platform — here's a quick orientation</div>
              </div>
              <button onClick={()=>setShowNavDemo(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)"}}>{IC.x}</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[
                {icon:"📊",label:"Overview",desc:"Global compliance score, framework radars, overdue alerts"},

                {icon:"🔥",label:"Heatmap & Gaps",desc:"Risk concentration and gap analysis for executives"},
                {icon:"📋",label:"Policies Module",desc:"Upload, version-control, and track policy acknowledgments"},
                {icon:"🧾",label:"Audit Log",desc:"Full trail: who did what, when, on which control"},
                {icon:"🎯",label:"Load Sample Data",desc:"Click 'Load Sample' in header to see a fully pre-filled demo"},

            <div style={{background:'var(--bg-accent)',borderRadius:8,padding:'10px 14px',marginBottom:14,borderLeft:'3px solid var(--brand-yellow)',fontSize:11,color:'var(--text-secondary)'}}>
              <strong style={{color:'var(--text-primary)'}}>Your current role:</strong> <span style={{color:'var(--brand-yellow-dark)',fontWeight:700}}>{role}</span> — permissions adjust automatically based on your role. Use the role badge in the header to preview different access levels.

            <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:'wrap'}}>

            </div>
          </div>
        </div>
      )}

          </button>

            {FRAMEWORKS.map(fw=>(
              <button key={fw} style={navBtn(activeFw===fw)} onClick={()=>{setActiveFw(fw);setExpandedItem(null);setFilterSection("All")}}>
                {fw}{stats[fw]&&<span style={{marginLeft:6,opacity:.6,fontSize:10}}>{stats[fw].compliance}%</span>}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{padding:'16px 24px',maxWidth:1440,margin:'0 auto'}} onClick={()=>{if(showGlobalSearch)setShowGlobalSearch(false)}}>

        {/* ─── DASHBOARD ──────────────────────────────────────────────────── */}
        {view==="dashboard"&&(
          <div className="fade-in">
            {isDemoMode&&(
              <div style={{background:'linear-gradient(135deg,#fef3c7,#fef9e0)',border:'1px solid #f59e0b40',borderRadius:10,padding:14,marginBottom:16,display:'flex',gap:10,alignItems:'center',fontSize:11,color:'#92400e'}}>
                <span style={{fontSize:18}}>🏭</span>
                <div><strong>ACME Manufacturing Ltd. — ISO 27001 Certification Programme 2025</strong><br/>This is a realistic demo workspace showing a manufacturing company mid-way through their ISO 27001 journey. Some controls are compliant, others are in progress, and some have gaps to close.</div>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:20}}>

                {label:"Overall Compliance",val:globalStats.pct+"%",sub:`${globalStats.compliant} of ${globalStats.total}`,color:globalStats.pct>=80?'#16a34a':globalStats.pct>=50?'#f59e0b':'#ef4444',pct:globalStats.pct},
                {label:"Step Progress",val:globalStats.stepPct+"%",sub:`${globalStats.stepsDone} of ${globalStats.steps}`,color:'var(--brand-yellow-dark)',pct:globalStats.stepPct},
                {label:"Avg Maturity",val:globalStats.avgMat+"/5",sub:"Target: 3.0+",color:'#8b5cf6',pct:(parseFloat(globalStats.avgMat)/5)*100}

                <div key={i} className="card" style={{padding:16,cursor:'pointer'}} onClick={()=>{if(c.label==='Total Controls'){setView('checklist');}else if(c.label==='Overall Compliance'){setView('gaps');}else if(c.label==='Step Progress'){setView('roadmap');}else if(c.label==='Avg Maturity'){setView('scorecard');}}}>
                  <div className="label">{c.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:c.color,letterSpacing:'-0.03em',margin:'4px 0'}}>{c.val}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>{c.sub}</div>
                  {c.pct!==undefined&&<div style={{marginTop:8}}><PBar pct={c.pct} color={c.color}/></div>}
                </div>
              ))}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:12,marginBottom:20}}>
              {FRAMEWORKS.map(fw=>{
                const s=stats[fw];if(!s)return null;
                const secs=[...new Set(RAW[fw].map(i=>i.sec))];
                const radarLabels=secs.map(sec=>sec.replace(/ANNEX |PHASE \d+: |ISMS /g,'').slice(0,20));
                const radarVals=secs.map(sec=>{
                  const items=RAW[fw].filter(i=>i.sec===sec);
                  return items.reduce((sum,i)=>sum+(parseInt(userState[fw][i.i]?.maturity)||0),0)/(items.length||1);
                });
                return(
                  <div key={fw} className="card" style={{padding:16,cursor:'pointer'}} onClick={()=>{setActiveFw(fw);setView("checklist");setSearchQ("");setFilterStatus("All");setFilterPriority("All");setFilterSection("All");}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                      <span style={{fontSize:13,fontWeight:700}}>{fw}</span>
                      <span style={{...badge(s.compliance>=80?'#16a34a':s.compliance>=50?'#f59e0b':'#ef4444')}}>{s.compliance}%</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                      <div><div className="label">Controls</div><div style={{fontWeight:700}}>{s.total}</div></div>
                      <div><div className="label">Steps</div><div style={{fontWeight:700}}>{s.stepProgress}%</div></div>
                      <div><div className="label">Maturity</div><div style={{fontWeight:700}}>{s.avgMaturity}/5</div></div>
                      <div><div className="label">Overdue</div><div style={{fontWeight:700,color:overdueItems.filter(o=>o.fw===fw).length?'#ef4444':'var(--text-primary)'}}>{overdueItems.filter(o=>o.fw===fw).length}</div></div>

                    {radarLabels.length>=3&&<RadarChart labels={radarLabels} values={radarVals} size={200}/>}
                    <div style={{marginTop:8}}>

                          <span style={badge(SC[st])}><span style={{width:5,height:5,borderRadius:'50%',background:SC[st]}}/>{st}</span>
                          <span style={{fontSize:11,fontWeight:600}}>{s.byStatus[st]}</span>

                    </div>
                  </div>

            <div className="card" style={{padding:16,marginBottom:16}}>

                const items=RAW[activeFw].filter(i=>i.sec===sec);
                const compliant=items.filter(i=>userState[activeFw][i.i]?.status==="Compliant").length;
                const pct=items.length?Math.round((compliant/items.length)*100):0;

                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:11,fontWeight:500}}>{sec}</span>
                      <span style={{fontSize:10,color:'var(--text-muted)'}}>{compliant}/{items.length} ({pct}%)</span>
                    </div>
                    <PBar pct={pct} color={pct>=80?'#16a34a':pct>=50?'#f59e0b':'#94a3b8'} h={4}/>
                  </div>
                );
              })}
            </div>

            {snapshots.length>0&&(

                      <span style={{fontSize:11}}>{snap.label}</span>
                      <span style={{fontSize:10,color:'var(--text-muted)'}}>{Math.round((compliant/total)*100)}% compliant ({compliant}/{total})</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

              </div>
              <select style={sel} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="All">All Status</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
              <select style={sel} value={filterPriority} onChange={e=>setFilterPriority(e.target.value)}><option value="All">All Priority</option>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select>
              <select style={sel} value={filterSection} onChange={e=>setFilterSection(e.target.value)}>{sections.map(s=><option key={s} value={s}>{s==="All"?"All Sections":s}</option>)}</select>
              <span style={{fontSize:10,color:'var(--text-muted)'}}>{filteredItems.length} items</span>
            </div>

            <div style={{display:'flex',gap:4,marginBottom:12,flexWrap:'wrap'}}>

              })}
            </div>

            {filteredItems.length===0?(
              <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>
                <p>No controls match your filters.</p>
                <button style={{...sel,marginTop:8}} onClick={()=>{setSearchQ('');setFilterStatus('All');setFilterPriority('All');setFilterSection('All')}}>Clear Filters</button>
              </div>
            ):(
              filteredItems.map(item=>{
                const st=userState[activeFw][item.i];
                const isExp=expandedItem===item.i;
                const stepsDone=(st.stepsDone||[]).filter(Boolean).length;
                const stepPct=item.s.length?Math.round((stepsDone/item.s.length)*100):0;

                const evidCollected=evidArr.filter((_,i)=>evidSt[i]).length;
                return(
                  <div key={item.i} className="card" style={{marginBottom:8,borderColor:isExp?'var(--border-accent)':'var(--border)'}}>
                    <div style={{padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}} onClick={()=>setExpandedItem(isExp?null:item.i)}>
                      <span style={{color:'var(--text-muted)',flexShrink:0}}>{isExp?IC.chevD:IC.chevR}</span>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--brand-yellow-dark)',minWidth:48,fontFamily:'Poppins'}}>{item.i}</span>
                      <span style={{fontSize:12,fontWeight:500,flex:1}}>{item.t}</span>
                      <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                        <span style={badge(SC[st.status])}><span style={{width:5,height:5,borderRadius:'50%',background:SC[st.status]}}/>{st.status}</span>
                        <span style={badge(PC[st.priority])}>{st.priority}</span>
                        <span style={{fontSize:10,color:'var(--text-muted)',minWidth:32,textAlign:'right'}}>{stepPct}%</span>
                        <div style={{width:36,height:4,borderRadius:2,background:'var(--border-light)',overflow:'hidden'}}>
                          <div style={{height:'100%',width:stepPct+'%',background:'var(--brand-yellow)',borderRadius:2}}/>
                        </div>
                      </div>
                    </div>
                    {isExp&&(
                      <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border-light)'}}>
                        <p style={{color:'var(--text-secondary)',fontSize:11,lineHeight:1.6,margin:'10px 0 14px',background:'var(--bg-accent)',padding:10,borderRadius:8,borderLeft:'3px solid var(--brand-yellow)'}}>{item.d}</p>

                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8,marginBottom:14}}>
                          <div><span className="label">Status</span>
                            <select style={{...sel,opacity:perms.updateControls?1:.6}} value={st.status}
                              disabled={!perms.updateControls}
                              onChange={e=>{
                                const newStatus=e.target.value;
                                // Control Owner can only go up to Implemented, CM/Admin can approve
                                if(role==="Control Owner"&&(newStatus==="Compliant"||newStatus==="Under Review"))return;
                                updateItemWithAudit(activeFw,item.i,{status:newStatus},"Status Updated");
                                if(newStatus==="Under Review") pushNotification("approval",`${item.i} submitted for review by ${meta?.users?.find(u=>u.id===session?.userId)?.name||"User"}`);
                              }}>
                              {STATUSES.map(s=><option key={s}>{s}</option>)}</select>
                            {!perms.updateControls&&<div style={{fontSize:9,color:'#ef4444',marginTop:2}}>Read-only for your role</div>}
                          </div>
                          <div><span className="label">Priority</span><select style={sel} value={st.priority} disabled={!perms.updateControls} onChange={e=>updateItem(activeFw,item.i,{priority:e.target.value})}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></div>
                          <div><span className="label">Maturity</span><select style={sel} value={st.maturity} disabled={!perms.updateControls} onChange={e=>updateItem(activeFw,item.i,{maturity:e.target.value})}>{MATURITY.map(m=><option key={m}>{m}</option>)}</select></div>
                          <div><span className="label">Owner</span><input style={inp} value={st.owner} placeholder="Assign..." disabled={!perms.updateControls} onChange={e=>updateItem(activeFw,item.i,{owner:e.target.value})}/></div>
                          <div><span className="label">Target Date</span><input type="date" style={inp} value={st.targetDate} disabled={!perms.updateControls} onChange={e=>updateItem(activeFw,item.i,{targetDate:e.target.value})}/></div>

                          <div style={{marginTop:6}}>
                            {item.s.map((step,idx)=>(
                              <div key={idx} style={{display:'flex',alignItems:'flex-start',gap:6,padding:'3px 0'}}>

                                  {(st.stepsDone||[])[idx]&&<span style={{color:'#fff'}}>{IC.check}</span>}
                                </div>
                                <span style={{fontSize:11,color:(st.stepsDone||[])[idx]?'var(--text-muted)':'var(--text-primary)',textDecoration:(st.stepsDone||[])[idx]?'line-through':'none',lineHeight:1.4}}>{step}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* Assessment */}
                        <div style={{marginBottom:14}}>
                          <button onClick={()=>setShowAssess(showAssess===item.i?null:item.i)} style={{background:'var(--bg-input)',border:'1px solid var(--border)',color:'var(--text-secondary)',borderRadius:6,padding:'5px 10px',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                            {IC.clip} Assessment ({(st.assessmentAnswers||[]).filter(a=>a!==null).length}/{item.q.length})
                            {(st.assessmentAnswers||[]).filter(a=>a!==null).length===item.q.length&&(st.assessmentAnswers||[]).every(a=>a===true)&&<span style={{color:'#16a34a',marginLeft:4}}>✓ All Passed</span>}
                          </button>
                          {showAssess===item.i&&(
                            <div style={{marginTop:6,background:'var(--bg-accent)',borderRadius:8,padding:10}}>
                              {item.q.map((q,idx)=>(
                                <div key={idx} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:'1px solid var(--border-light)'}}>
                                  <span style={{fontSize:11,color:'var(--text-secondary)',flex:1,lineHeight:1.4}}>{q}</span>
                                  <div style={{display:'flex',gap:3,flexShrink:0}}>
                                    <button onClick={()=>{const a=[...(st.assessmentAnswers||[])];a[idx]=a[idx]===true?null:true;updateItem(activeFw,item.i,{assessmentAnswers:a})}}
                                      style={{padding:'2px 8px',borderRadius:3,border:'none',fontSize:9,fontWeight:600,cursor:'pointer',background:(st.assessmentAnswers||[])[idx]===true?'#16a34a':'var(--bg-input)',color:(st.assessmentAnswers||[])[idx]===true?'#fff':'var(--text-muted)'}}>YES</button>
                                    <button onClick={()=>{const a=[...(st.assessmentAnswers||[])];a[idx]=a[idx]===false?null:false;updateItem(activeFw,item.i,{assessmentAnswers:a})}}
                                      style={{padding:'2px 8px',borderRadius:3,border:'none',fontSize:9,fontWeight:600,cursor:'pointer',background:(st.assessmentAnswers||[])[idx]===false?'#ef4444':'var(--bg-input)',color:(st.assessmentAnswers||[])[idx]===false?'#fff':'var(--text-muted)'}}>NO</button>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>

                        {/* Evidence */}
                        <div style={{marginBottom:14}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                            <span className="label">Evidence / Artifacts</span>
                            <span style={{fontSize:10,color:evidCollected===evidArr.length?'#16a34a':'var(--text-muted)'}}>{evidCollected}/{evidArr.length} collected</span>
                          </div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {evidArr.map((e,idx)=>{
                              const ef=getEvidFile(activeFw,item.i,idx);
                              const esColor=ef?ESC[ef.status]||'#6b7280':ESC["Missing"];
                              return(
                                <div key={idx} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',background:ef?esColor+'15':'var(--bg-input)',borderRadius:6,border:`1px solid ${ef?esColor+'40':'var(--border)'}`,cursor:'pointer'}}
                                  onClick={()=>setShowEvidenceModal({fw:activeFw,id:item.i,idx,evid:e})}>
                                  <span style={{width:5,height:5,borderRadius:'50%',background:esColor,flexShrink:0}}/>
                                  <span style={{fontSize:10,color:ef?esColor:'var(--text-muted)',fontWeight:ef?600:400}}>{e}</span>
                                  {ef&&<span style={{fontSize:9,color:esColor,fontWeight:600}}>{ef.status}</span>}
                                </div>
                              );
                            })}
                          </div>
                          <div style={{fontSize:9,color:'var(--text-muted)',marginTop:4}}>Click an evidence item to manage its status and upload.</div>
                        </div>

                        {/* Notes */}
                        <div><span className="label">Notes / Gaps</span>
                          <textarea style={{...inp,minHeight:50,resize:'vertical',lineHeight:1.5}} value={st.notes} placeholder="Document gaps, remediation plans..." onChange={e=>updateItem(activeFw,item.i,{notes:e.target.value})}/>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* ─── HEATMAP ────────────────────────────────────────────────────── */}
        {view==="heatmap"&&(
          <div className="fade-in">
            <h3 style={{fontSize:13,fontWeight:700,margin:'0 0 12px'}}>Risk Heatmap — {activeFw}</h3>
            <p style={{fontSize:11,color:'var(--text-secondary)',margin:'0 0 16px'}}>Controls mapped by Priority (rows) × Status (columns). Darker = higher risk concentration.</p>
            <div className="card" style={{padding:16,overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr><th style={{padding:'6px 8px',textAlign:'left',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:10}}>Priority / Status</th>
                    {STATUSES.map(s=><th key={s} style={{padding:'6px 8px',textAlign:'center',borderBottom:'2px solid var(--border)',color:SC[s],fontSize:10}}>{s}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {PRIORITIES.map(p=>(

              <div className="card" style={{padding:32,textAlign:'center',color:'var(--text-muted)'}}>
                <div style={{fontSize:32,marginBottom:8}}>🧾</div>
                <div style={{fontWeight:600,marginBottom:4}}>No audit records yet</div>
                <div style={{fontSize:11}}>Actions you take on controls, evidence, and policies will appear here.</div>
                {isDemoMode&&<div style={{marginTop:10,fontSize:10,color:'#f59e0b',fontStyle:'italic'}}>Try loading sample data to see sample audit entries.</div>}
              </div>
            ):(
              <div className="card" style={{padding:0,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                  <thead>
                    <tr style={{background:'var(--bg-secondary)'}}>
                      {["Timestamp","User","Role","Action","Control","Detail"].map(h=>(
                        <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:10,fontWeight:700,color:'var(--text-muted)',borderBottom:'1px solid var(--border)',textTransform:'uppercase',letterSpacing:'.05em'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {auditLog.map((entry,i)=>{
                      const actionColors={"Evidence Submitted":"#3b82f6","Evidence Accepted":"#16a34a","Evidence Rejected":"#ef4444","Status Updated":"#f59e0b","Control Approved":"#16a34a","Policy Acknowledged":"#8b5cf6"};
                      const ac=actionColors[entry.action]||"var(--text-muted)";
                      return(
                        <tr key={entry.id||i} style={{borderBottom:'1px solid var(--border-light)'}}>
                          <td style={{padding:'8px 12px',color:'var(--text-muted)',fontSize:10,whiteSpace:'nowrap'}}>{new Date(entry.ts).toLocaleString()}</td>
                          <td style={{padding:'8px 12px',fontWeight:600}}>{entry.user}</td>
                          <td style={{padding:'8px 12px'}}>
                            <span style={{...badge('#6b7280'),fontSize:9}}>{entry.role}</span>
                          </td>
                          <td style={{padding:'8px 12px'}}>
                            <span style={{fontWeight:600,color:ac}}>{entry.action}</span>
                          </td>
                          <td style={{padding:'8px 12px',fontFamily:'Poppins',fontSize:10,color:'var(--brand-yellow-dark)',fontWeight:700}}>
                            {entry.fw&&`${entry.fw}: `}{entry.control||"—"}
                          </td>
                          <td style={{padding:'8px 12px',color:'var(--text-secondary)',fontSize:10}}>{entry.detail||entry.file||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* FOOTER */}
        <div style={{textAlign:'center',padding:'24px 0 12px',color:'var(--text-muted)',fontSize:9,borderTop:'1px solid var(--border-light)',marginTop:24}}>
          {branding.company||"THE IT WORK"} — We Make IT WORK. • Enterprise Compliance Portal • Data saved in your browser.
          {isDemoMode&&<span style={{marginLeft:8,color:'#f59e0b',fontWeight:600}}>• SAMPLE DATA MODE — click "Remove Sample" to return to your workspace</span>}
        </div>
      </div>

      {/* ── EVIDENCE MANAGEMENT MODAL ──────────────────────────────────────── */}
      {showEvidenceModal&&(()=>{
        const {fw,id,idx,evid}=showEvidenceModal;
        const ef=getEvidFile(fw,id,idx);
        const [localFile,setLocalFile]=React.useState("");
        const [reviewComment,setReviewComment]=React.useState("");
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
            <div className="card" style={{maxWidth:480,width:'100%',padding:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>Evidence Management</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{id} — {evid}</div>
                </div>
                <button onClick={()=>setShowEvidenceModal(null)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)'}}>{IC.x}</button>
              </div>

              {/* Current Status */}
              <div style={{background:'var(--bg-accent)',borderRadius:8,padding:12,marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span className="label">Current Status</span>
                  <span style={{...badge(ESC[ef?.status||"Missing"]),fontSize:11}}>{ef?.status||"Missing"}</span>
                </div>
                {ef&&(
                  <div style={{fontSize:10,color:'var(--text-secondary)',lineHeight:1.6}}>
                    <div>File: <strong>{ef.name}</strong></div>
                    <div>Submitted: {fmtDate(ef.submittedAt)} by {ef.submittedBy}</div>
                    {ef.reviewedAt&&<div>Reviewed: {fmtDate(ef.reviewedAt)} by {ef.reviewedBy}</div>}
                    {ef.comment&&<div style={{marginTop:4,fontStyle:'italic'}}>Comment: {ef.comment}</div>}
                  </div>
                )}
              </div>

              {/* Status Flow visualization */}
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,gap:4}}>
                {EVIDENCE_STATUSES.map((s,i)=>{
                  const cur=ef?.status||"Missing";
                  const idx2=EVIDENCE_STATUSES.indexOf(cur);
                  const isActive=s===cur;
                  const isPast=i<idx2;
                  return(
                    <div key={s} style={{flex:1,textAlign:'center'}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:isActive?ESC[s]:isPast?ESC[s]+'40':'var(--border)',margin:'0 auto 4px',display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${isActive?ESC[s]:isPast?ESC[s]+'60':'var(--border)'}`,fontSize:9,fontWeight:700,color:isActive?'#fff':isPast?ESC[s]:'var(--text-muted)'}}>
                        {isPast?'✓':i+1}
                      </div>
                      <div style={{fontSize:8,color:isActive?ESC[s]:'var(--text-muted)',fontWeight:isActive?700:400,lineHeight:1.2}}>{s}</div>
                    </div>
                  );
                })}
              </div>

              {/* Upload simulation (static preview) */}
              {(!ef||ef.status==="Rejected"||ef.status==="Expired")&&(
                <div style={{marginBottom:12}}>
                  <span className="label">Submit Evidence (Static Preview — enter filename)</span>
                  <div style={{display:'flex',gap:6}}>
                    <input style={inp} placeholder="e.g., Policy_v2.pdf" value={localFile} onChange={e=>setLocalFile(e.target.value)}/>
                    <button disabled={!localFile||!perms.canUploadEvidence} onClick={()=>{submitEvidence(fw,id,idx,localFile);setShowEvidenceModal(null);}}
                      style={{background:perms.canUploadEvidence&&localFile?'var(--brand-yellow)':'var(--border)',color:perms.canUploadEvidence&&localFile?'var(--brand-charcoal)':'var(--text-muted)',border:'none',borderRadius:6,padding:'5px 12px',fontSize:10,fontWeight:700,cursor:perms.canUploadEvidence&&localFile?'pointer':'not-allowed',whiteSpace:'nowrap'}}>
                      {IC.upload} Submit
                    </button>
                  </div>
                  {!perms.canUploadEvidence&&<div style={{fontSize:9,color:'#ef4444',marginTop:3}}>Your role ({role}) cannot upload evidence.</div>}
                  <div style={{fontSize:9,color:'var(--text-muted)',marginTop:3}}>Static preview: Max 50MB, all file types. SHA-256 hash + timestamp stored in SaaS phase.</div>
                </div>
              )}

              {/* Review actions for Compliance Manager/Admin */}
              {ef&&ef.status==="Submitted"&&perms.canApproveControls&&(
                <div style={{marginBottom:12}}>
                  <span className="label">Reviewer Decision</span>
                  <textarea style={{...inp,minHeight:50,resize:'vertical',marginBottom:6}} placeholder="Optional review comment..." value={reviewComment} onChange={e=>setReviewComment(e.target.value)}/>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>{reviewEvidence(fw,id,idx,"Accepted",reviewComment);setShowEvidenceModal(null);}} style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✓ Accept</button>
                    <button onClick={()=>{reviewEvidence(fw,id,idx,"Rejected",reviewComment);setShowEvidenceModal(null);}} style={{flex:1,background:'#ef4444',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✗ Reject</button>
                  </div>
                </div>
              )}

              {ef&&ef.status==="Under Review"&&perms.canApproveControls&&(
                <div style={{display:'flex',gap:6,marginBottom:12}}>
                  <button onClick={()=>{reviewEvidence(fw,id,idx,"Accepted","Approved after review");setShowEvidenceModal(null);}} style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✓ Mark Accepted</button>
                  <button onClick={()=>{reviewEvidence(fw,id,idx,"Rejected","Not acceptable");setShowEvidenceModal(null);}} style={{flex:1,background:'#ef4444',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✗ Mark Rejected</button>
                </div>
              )}

              <button onClick={()=>setShowEvidenceModal(null)} style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'7px 12px',fontSize:11,cursor:'pointer',color:'var(--text-secondary)'}}>Close</button>
            </div>
          </div>
        );
      })()}

      {/* ── ADD POLICY MODAL ───────────────────────────────────────────────── */}
      {showPolicyModal&&(()=>{
        const [pForm,setPForm]=React.useState({title:"",type:"Policy",owner:"",description:"",reviewDate:""});
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
            <div className="card" style={{maxWidth:460,width:'100%',padding:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:14}}>Add Policy / Procedure</div>
                <button onClick={()=>setShowPolicyModal(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)'}}>{IC.x}</button>
              </div>
              <div style={{marginBottom:10}}>
                <span className="label">Title</span>
                <input style={inp} placeholder="e.g., Information Security Policy v2.1" value={pForm.title} onChange={e=>setPForm({...pForm,title:e.target.value})}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                <div>
                  <span className="label">Type</span>
                  <select style={sel} value={pForm.type} onChange={e=>setPForm({...pForm,type:e.target.value})}>
                    {["Policy","Procedure","Standard","Guideline","Process"].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <span className="label">Document Owner</span>
                  <input style={inp} placeholder="e.g., CISO" value={pForm.owner} onChange={e=>setPForm({...pForm,owner:e.target.value})}/>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <span className="label">Description / Purpose</span>
                <textarea style={{...inp,minHeight:50,resize:'vertical'}} placeholder="Brief description..." value={pForm.description} onChange={e=>setPForm({...pForm,description:e.target.value})}/>
              </div>
              <div style={{marginBottom:16}}>
                <span className="label">Next Review Date</span>
                <input type="date" style={inp} value={pForm.reviewDate} onChange={e=>setPForm({...pForm,reviewDate:e.target.value})}/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button disabled={!pForm.title} onClick={()=>{
                  const doc={id:uid(),title:pForm.title,type:pForm.type,owner:pForm.owner,description:pForm.description,reviewDate:pForm.reviewDate,status:"Draft",version:"1.0",acknowledgedBy:[],createdAt:nowISO(),updatedAt:nowISO()};
                  setPolicies(prev=>{const n=[doc,...prev];savePolicies(activeWsId,n);return n;});
                  addAudit("Policy Created",{title:pForm.title,type:pForm.type});
                  setShowPolicyModal(false);
                }} style={{flex:1,background:pForm.title?'var(--brand-yellow)':'var(--border)',color:pForm.title?'var(--brand-charcoal)':'var(--text-muted)',border:'none',borderRadius:6,padding:'8px',fontSize:12,fontWeight:700,cursor:pForm.title?'pointer':'not-allowed'}}>
                  Create Policy →
                </button>
                <button onClick={()=>setShowPolicyModal(false)} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 16px',fontSize:12,cursor:'pointer',color:'var(--text-secondary)'}}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
