l, operational, strategic)?", "Are risks documented in a risk register?", "Is risk identification performed at least annually and on significant changes?"], "e": "Risk Identification Methodology, Risk Workshop Records, Risk Register, Risk Source Taxonomy", "sec": "PROCESS — IMPLEMENTING RISK MANAGEMENT"}, {"i": "31000-Pr2", "t": "Risk Analysis & Evaluation", "d": "Analyze identified risks to determine their likelihood and consequence, then evaluate which risks require treatment based on risk criteria.", "s": ["Define risk likelihood and impact scales (3x3 or 5x5 matrix)", "Score all identified risks consistently", "Define risk acceptance criteria and thresholds", "Prioritize risks requiring treatment", "Review and validate risk scores with risk owners", "Escalate risks exceeding appetite to management"], "q": ["Are risks assessed for likelihood and impact using a consistent scale?", "Is a risk matrix or scoring methodology used?", "Are risks prioritized against defined risk criteria?", "Are risk evaluation results reviewed by appropriate authority?"], "e": "Risk Scoring Methodology, Risk Matrix, Risk Register with Scores, Risk Evaluation Review Records", "sec": "PROCESS — IMPLEMENTING RISK MANAGEMENT"}, {"i": "31000-Pr3", "t": "Risk Treatment", "d": "Select and implement risk treatment options (avoid, reduce, share, accept) and develop treatment plans with owners and timelines.", "s": ["Select treatment option per risk (avoid/reduce/share/accept)", "Document treatment plans with specific actions, owners, and target dates", "Track treatment plan implementation in risk register", "Assess residual risk after treatment implementation", "Report treatment progress to management quarterly", "Escalate unacceptable residual risks for executive decision"], "q": ["Is a risk treatment option selected for each risk?", "Are treatment plans documented with owners and target dates?", "Are treatment actions tracked to completion?", "Is residual risk evaluated after treatment?"], "e": "Risk Treatment Plans, Treatment Tracking Register, Residual Risk Assessments, Owner Assignments", "sec": "PROCESS — IMPLEMENTING RISK MANAGEMENT"}], "COSO ERM": [{"i": "COSO-GC1", "t": "Board Risk Oversight", "d": "The board oversees the company's enterprise risk management program and holds management accountable for risk management performance.", "s": ["Establish board risk committee or assign ERM oversight to audit committee", "Define board's risk appetite setting role", "Develop quarterly risk report format for board", "Present key emerging risks to board at least annually", "Document board actions on risk management recommendations"], "q": ["Does the board have a risk committee or formal ERM oversight function?", "Is ERM performance reported to the board periodically?", "Does the board set risk appetite?", "Are board members informed on key emerging risks?"], "e": "Board Risk Committee Charter, Risk Reports to Board, Risk Appetite Statement Approved by Board, Board Meeting Minutes", "sec": "COMPONENT 1 — GOVERNANCE & CULTURE"}, {"i": "COSO-GC2", "t": "Risk Culture", "d": "Foster a risk-aware culture where employees at all levels understand risk management expectations and feel empowered to raise risk concerns.", "s": ["Communicate risk management expectations to all staff", "Deliver risk management awareness training (annual)", "Establish safe escalation mechanism for risk concerns", "Conduct risk culture survey biannually", "Act on and report outcomes of risk culture assessments"], "q": ["Is risk management expectations communicated to all staff?", "Are staff trained on risk management?", "Is there a mechanism to escalate risk concerns without fear?", "Is risk awareness measured?"], "e": "Risk Culture Training Records, Communication Evidence, Escalation Mechanism, Risk Culture Survey Results", "sec": "COMPONENT 1 — GOVERNANCE & CULTURE"}, {"i": "COSO-SO1", "t": "Business Context", "d": "Analyze the business environment to understand how external factors may create risks to strategy and objectives.", "s": ["Conduct annual PESTLE analysis", "Link environmental factors to strategic risks", "Assess implications for organizational strategy and objectives", "Update analysis on significant market or regulatory changes", "Report environmental risk implications to leadership"], "q": ["Is external business context analyzed (PESTLE)?", "Are risks from the business environment linked to strategic objectives?", "Is context analysis updated when significant changes occur?"], "e": "PESTLE Analysis, Environmental Scan Report, Strategic Risk Assessment", "sec": "COMPONENT 2 — STRATEGY & OBJECTIVE-SETTING"}, {"i": "COSO-SO2", "t": "Risk Appetite", "d": "Define the amount of risk the organization is willing to accept in pursuit of its objectives, expressed in qualitative and quantitative terms.", "s": ["Facilitate risk appetite workshop with board and executive team", "Document risk appetite statements per strategic objective", "Define quantitative risk tolerance thresholds", "Communicate risk appetite throughout the organization", "Review risk appetite alignment annually with board"], "q": ["Is a formal risk appetite statement approved by the board?", "Are risk appetite statements linked to strategic objectives?", "Are risk tolerance thresholds defined?", "Is risk appetite communicated and applied operationally?"], "e": "Risk Appetite Statement, Board Approval Record, Risk Tolerance Thresholds, Operational Application Evidence", "sec": "COMPONENT 2 — STRATEGY & OBJECTIVE-SETTING"}, {"i": "COSO-P1", "t": "Risk Identification", "d": "Identify risks that may affect strategy achievement and business objectives, considering both internal and external sources.", "s": ["Develop enterprise risk taxonomy (strategic, operational, financial, compliance, reputational)", "Implement systematic risk identification process (workshops, interviews, risk reviews)", "Map identified risks to strategic and operational objectives", "Build and maintain enterprise risk register", "Update register quarterly and on significant changes"], "q": ["Are risks identified systematically (not just ad hoc)?", "Are all risk categories considered?", "Is there a consistent enterprise risk taxonomy?", "Are risks linked to specific strategic or operational objectives?"], "e": "ERM Risk Register, Risk Taxonomy, Risk Identification Process, Objective-Risk Mapping", "sec": "COMPONENT 3 — PERFORMANCE"}, {"i": "COSO-P2", "t": "Risk Assessment", "d": "Assess each identified risk for likelihood and severity, considering inherent and residual risk levels.", "s": ["Assess inherent risk (pre-control) for all risks", "Identify existing controls and assess their effectiveness", "Calculate residual risk (post-control)", "Prioritize risks by residual risk score", "Review assessments at least annually and on significant changes"], "q": ["Is inherent risk assessed before controls?", "Are controls identified and their effectiveness assessed?", "Is residual risk evaluated?", "Are risk assessments reviewed with appropriate frequency?"], "e": "Risk Assessment Methodology, Inherent/Residual Risk Scores, Control Effectiveness Evidence, Review Schedule", "sec": "COMPONENT 3 — PERFORMANCE"}, {"i": "COSO-P3", "t": "Risk Prioritization & Response", "d": "Prioritize risks based on severity and select risk responses (accept, avoid, reduce, share) aligned with risk appetite.", "s": ["Prioritize risks using risk heat map or scoring", "Review risk portfolio for concentration and correlation", "Select response strategy per risk aligned to appetite", "Develop and assign risk response plans with owners and deadlines", "Monitor and report implementation progress monthly"], "q": ["Are risks prioritized by severity and strategic importance?", "Is a response strategy selected for each significant risk?", "Are risk responses implemented with owners and timelines?", "Are risk portfolios reviewed collectively for concentration?"], "e": "Risk Prioritization Matrix, Response Plans, Risk Portfolio View, Response Tracking Records", "sec": "COMPONENT 3 — PERFORMANCE"}, {"i": "COSO-R1", "t": "Monitoring & Review", "d": "Continuously monitor ERM performance and review the program to ensure it remains effective and relevant.", "s": ["Define ERM KPIs (risk register completeness, treatment completion rate, incidents vs risk register)", "Monitor ERM KPIs monthly", "Conduct formal ERM program review annually", "Update ERM framework and processes based on review findings", "Escalate significant risk profile changes to board promptly"], "q": ["Are ERM KPIs defined and monitored?", "Are ERM reviews performed at defined frequencies?", "Is the ERM program updated based on review findings?", "Are significant changes in risk profile escalated promptly?"], "e": "ERM KPIs, Monitoring Reports, ERM Review Records, Change Escalation Evidence", "sec": "COMPONENT 4 — REVIEW & REVISION"}, {"i": "COSO-IC1", "t": "Risk Information & Reporting", "d": "Capture and communicate risk information to the right people at the right time to support informed decision-making.", "s": ["Define risk reporting framework (what, to whom, frequency)", "Develop report templates for operational, management, and board levels", "Implement regular risk reporting cycle", "Include lessons learned from incidents and near-misses in reports", "Measure and improve report quality based on stakeholder feedback"], "q": ["Is risk information communicated to decision-makers at appropriate levels?", "Is there a defined risk reporting framework (operational, management, board)?", "Are risk reports timely, accurate, and actionable?", "Are lessons learned from incidents communicated?"], "e": "Risk Reporting Framework, Risk Reports (Operational, Management, Board), Lessons Learned Records", "sec": "COMPONENT 5 — INFORMATION, COMMUNICATION & REPORTING"}], "ISO 20000-1": [{"i": "20000-4.1", "t": "Understanding the Organization", "d": "Determine internal and external factors relevant to the SMS (Service Management System) and how they affect the ability to deliver managed services.", "s": ["Conduct internal and external context analysis for SMS", "Identify all stakeholders and their service management requirements", "Document regulatory and contractual service management obligations", "Determine SMS scope based on context", "Review context at least annually"], "q": ["Are internal and external factors affecting SMS documented?", "Is a stakeholder analysis for service management performed?", "Are obligations (regulatory, contractual) identified?", "Is context reviewed periodically?"], "e": "Context Analysis Document, Stakeholder Register, Obligations Register, Review Records", "sec": "CLAUSE 4 — CONTEXT OF THE ORGANIZATION"}, {"i": "20000-6.1", "t": "Actions to Address Risks and Opportunities", "d": "Identify and address risks and opportunities that could affect SMS outcomes and service delivery.", "s": ["Identify risks specific to the SMS and service delivery", "Prioritize risks using likelihood × impact", "Define and implement risk treatment actions", "Identify improvement opportunities from risk analysis", "Review risk register quarterly"], "q": ["Are SMS-specific risks identified?", "Are risk treatment actions documented?", "Are opportunities for improvement identified?", "Are risks and opportunities reviewed regularly?"], "e": "SMS Risk Register, Risk Treatment Plans, Improvement Opportunities Register", "sec": "CLAUSE 6 — PLANNING"}, {"i": "20000-8.3", "t": "Service Catalogue Management", "d": "Maintain a service catalogue that accurately reflects all current services, their descriptions, status, and dependencies.", "s": ["Identify and document all services in scope", "Create service catalogue with descriptions, status, SLAs, and dependencies", "Publish catalogue to relevant stakeholders", "Define process to update catalogue on service changes", "Review catalogue completeness and accuracy quarterly"], "q": ["Is a service catalogue documented and published?", "Does the catalogue include all current services?", "Are service descriptions accurate and current?", "Is the catalogue reviewed when services change?"], "e": "Service Catalogue, Service Descriptions, Review Records, Change Trigger Process", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-8.6", "t": "Service Level Management", "d": "Agree on and manage service levels with customers, monitor performance against SLAs, and act on service level breaches.", "s": ["Define SLA parameters with customers (availability, response time, resolution time)", "Document and execute SLAs as part of service agreements", "Implement SLA monitoring and reporting tools", "Report SLA performance to customers monthly", "Track SLA breaches and implement root cause analysis", "Review SLAs annually with customers"], "q": ["Are SLAs documented and signed by both parties?", "Are SLAs measurable and aligned to business needs?", "Is SLA performance monitored and reported?", "Are breaches tracked and remediated?"], "e": "SLA Documents, SLA Monitoring Reports, Breach Log, Remediation Records, Customer Review Meeting Minutes", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-8.7", "t": "Service Availability & Continuity", "d": "Plan and manage service availability and continuity to meet agreed service levels under normal and disrupted conditions.", "s": ["Define and agree availability targets per service", "Implement availability monitoring (uptime tools, health checks)", "Develop service continuity plan addressing disaster scenarios", "Test continuity plan annually (failover, backup restoration)", "Report availability performance and plan test results to customers"], "q": ["Are availability targets defined and agreed?", "Is availability monitored continuously?", "Is there a service continuity plan?", "Is the continuity plan tested annually?"], "e": "Availability Plan, Availability Monitoring Reports, Service Continuity Plan, Continuity Test Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-8.8", "t": "Capacity Management", "d": "Ensure that current and future capacity requirements for IT services and infrastructure are identified and resourced.", "s": ["Inventory all capacity-constrained resources (CPU, storage, network, licenses)", "Define capacity thresholds and configure monitoring alerts", "Conduct capacity planning reviews quarterly and before major projects", "Document capacity plan with growth projections", "Report capacity status and risks to management monthly"], "q": ["Is capacity monitored for all critical systems?", "Is capacity planning performed before significant demand changes?", "Are capacity thresholds defined and alerts configured?", "Is capacity reported to management?"], "e": "Capacity Plan, Capacity Monitoring Reports, Threshold Alert Configuration, Capacity Review Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-8.9", "t": "Change & Release Management", "d": "Manage changes to IT services and infrastructure in a controlled and traceable manner, minimizing service disruption.", "s": ["Define and document change management process and policy", "Establish CAB with defined membership and meeting cadence", "Implement change request workflow in ITSM tool", "Require testing evidence before release to production", "Define emergency change procedure", "Report change KPIs (success rate, backout rate) monthly"], "q": ["Are all changes processed through a formal change process?", "Is there a change advisory board (CAB)?", "Are releases tested before production deployment?", "Is change success rate measured?"], "e": "Change Management Policy, Change Register, CAB Records, Release Test Evidence, Change Success Metrics", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-8.10", "t": "Incident & Service Request Management", "d": "Log, classify, prioritize, resolve, and close all incidents and service requests within agreed timelines.", "s": ["Deploy ITSM tool for incident and service request logging", "Define incident priority matrix (impact × urgency)", "Configure SLA timers per priority level", "Conduct post-incident review for all P1/major incidents", "Report incident metrics (volume, MTTR, SLA compliance) monthly"], "q": ["Are all incidents and service requests logged in ITSM tool?", "Are incidents classified and prioritized by impact/urgency?", "Are incidents resolved within SLA timelines?", "Are major incidents subject to post-incident review?"], "e": "Incident Register, Priority Matrix, SLA Compliance Reports, Major Incident Review Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "20000-9.1", "t": "Monitoring, Measurement & Evaluation", "d": "Monitor and measure SMS performance against defined metrics and evaluate whether objectives are being met.", "s": ["Define KPIs for all key SMS processes", "Implement measurement data collection (automated where possible)", "Produce monthly performance reports for management", "Analyze trends and identify improvement areas", "Present performance to management review"], "q": ["Are SMS KPIs defined and measured?", "Is performance data collected and analyzed regularly?", "Are performance reports produced for relevant stakeholders?", "Is performance used to drive improvement decisions?"], "e": "KPI Definitions, Performance Reports, Analysis Records, Management Review Inputs", "sec": "CLAUSE 9 — PERFORMANCE EVALUATION"}], "ISO 22301": [{"i": "22301-4.1", "t": "Organizational Context for BCM", "d": "Understand internal and external factors that affect the organization's ability to achieve business continuity objectives.", "s": ["Conduct internal and external context analysis for BCM", "Identify stakeholders and their BCM requirements", "Define BCMS (Business Continuity Management System) scope", "Document and approve BCMS scope statement", "Review context annually or when significant changes occur"], "q": ["Are internal and external factors affecting BCM documented?", "Are interested parties and their BCM expectations identified?", "Is the BCM scope formally defined?", "Is context reviewed annually?"], "e": "BCM Context Analysis, Stakeholder Register, BCMS Scope Statement, Review Records", "sec": "CLAUSE 4 — CONTEXT & SCOPE"}, {"i": "22301-6.1", "t": "BCM Objectives & Planning", "d": "Establish business continuity objectives, determine what is needed to achieve them, and plan actions to address risks and opportunities.", "s": ["Define measurable BC objectives (e.g., RTO/RPO targets)", "Identify risks and opportunities affecting BC objectives", "Develop plans to achieve BC objectives", "Assign owners and target dates to BC plans", "Track and report progress quarterly"], "q": ["Are BC objectives defined and measurable?", "Are BC risks and opportunities identified?", "Are plans in place to achieve BC objectives?", "Is progress against BC objectives tracked?"], "e": "BC Objectives Register, BCM Risk Assessment, BCM Plans, Progress Tracking Reports", "sec": "CLAUSE 6 — PLANNING"}, {"i": "22301-8.2", "t": "Business Impact Analysis", "d": "Conduct a Business Impact Analysis (BIA) to identify critical activities, dependencies, and the impact of disruption over time.", "s": ["Define BIA methodology and scope", "Identify all business activities and processes", "Assess impact of disruption over time (financial, operational, reputational)", "Determine RTO (Recovery Time Objective) per activity", "Determine RPO (Recovery Point Objective) per data/system", "Define MBCO (Minimum Business Continuity Objective)", "Document BIA results and get management approval", "Review BIA annually and after significant organizational changes"], "q": ["Is a formal BIA methodology defined?", "Are all critical business activities identified?", "Are RTO, RPO, and MBCO defined per activity?", "Is BIA reviewed after significant changes or annually?"], "e": "BIA Methodology, BIA Results Report, RTO/RPO/MBCO Register, Dependency Mapping, Review Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "22301-8.3", "t": "Business Continuity Strategy", "d": "Determine and select continuity strategies that can protect prioritized activities and meet defined RTO/RPO objectives.", "s": ["Review BIA results to understand recovery requirements", "Identify and evaluate BC strategy options per activity", "Select strategies meeting RTO/RPO at acceptable cost", "Document chosen strategies with rationale", "Get management approval of BC strategies", "Review strategies annually and after major BIA changes"], "q": ["Are BC strategies selected based on BIA results?", "Do strategies address protection, response, and recovery?", "Are strategies documented and approved?", "Are strategies reviewed for cost-effectiveness?"], "e": "BC Strategy Document, Strategy Cost-Benefit Analysis, Management Approval, BIA-Strategy Alignment Evidence", "sec": "CLAUSE 8 — OPERATION"}, {"i": "22301-8.4", "t": "Business Continuity Plans", "d": "Develop, document, and maintain business continuity plans (BCPs) that enable the organization to respond to and recover from disruptive incidents.", "s": ["Develop BCP for each critical business activity", "Include: activation criteria, roles, notification procedures, recovery steps", "Ensure BCPs are accessible offline (printed copies, off-site storage)", "Distribute BCPs to all relevant personnel", "Review and update BCPs annually and after exercises or incidents"], "q": ["Are BCPs documented for all critical activities?", "Do BCPs include activation criteria, roles, and recovery steps?", "Are BCPs accessible during an incident?", "Are BCPs reviewed annually and updated after exercises?"], "e": "Business Continuity Plans, Plan Distribution Evidence, Activation Criteria, Post-Exercise Update Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "22301-8.5", "t": "Exercising & Testing", "d": "Exercise and test BC plans to verify their effectiveness and identify improvement opportunities.", "s": ["Define annual BC exercise programme with scenario types", "Conduct tabletop exercises minimum annually", "Progress to live simulation exercises for critical activities", "Document exercise outcomes and gaps identified", "Implement lessons learned within 90 days", "Report exercise results to management"], "q": ["Are BCPs exercised at least annually?", "Are exercises designed to test realistic scenarios?", "Are exercise results documented?", "Are lessons learned implemented?"], "e": "Exercise Programme, Exercise Scenarios, Exercise Reports, Lessons Learned Register, Plan Update Evidence", "sec": "CLAUSE 8 — OPERATION"}, {"i": "22301-9.1", "t": "BCM Performance Monitoring", "d": "Monitor and measure BCM performance to ensure the BCMS is achieving its intended outcomes.", "s": ["Define BCM KPIs (exercise completion rate, RTO achievement, plan currency)", "Monitor and report BCM KPIs quarterly", "Track all BC activations and near-misses", "Conduct internal BCMS audit annually", "Present BCM performance at management review"], "q": ["Are BCM KPIs defined and measured?", "Are incidents and activations tracked?", "Are internal audits of the BCMS conducted?", "Is BCM performance reported to management?"], "e": "BCM KPIs, Incident/Activation Log, Internal Audit Reports, Management Review Records", "sec": "CLAUSE 9 — PERFORMANCE EVALUATION"}, {"i": "22301-10.1", "t": "Continual Improvement", "d": "Continuously improve the BCMS based on exercise outcomes, incidents, audits, and management review.", "s": ["Establish BCM improvement register", "Capture improvement actions from exercises, audits, incidents, and reviews", "Assign owners and target dates to all improvements", "Track and report improvement completion quarterly", "Validate improvements through subsequent exercises or reviews", "Present improvement outcomes at annual management review"], "q": ["Is there a formal process to capture and track BCM improvements?", "Are improvement actions tracked to completion?", "Is the improvement programme reviewed by management?", "Are improvements validated through future exercises?"], "e": "BCM Improvement Register, Action Tracking Records, Management Review Minutes, Validation Evidence", "sec": "CLAUSE 10 — IMPROVEMENT"}], "ISO 42001": [{"i": "42001-4.1", "t": "Understanding the Organization & Its Context", "d": "Identify internal and external factors that affect the organization's ability to achieve its intended outcomes for the AI Management System (AIMS). This includes the nature of AI systems in use, the markets served, and the regulatory environment.", "s": ["Identify all AI systems developed, deployed, or used by the organization", "Conduct internal context analysis (AI capabilities, data assets, governance maturity, culture)", "Conduct external context analysis (AI regulations, industry norms, societal expectations, competitive landscape)", "Document results in an AIMS Context Report", "Review context at least annually and on significant AI system changes"], "q": ["Are internal factors (capabilities, culture, structure) affecting AI use documented?", "Are external factors (regulation, market, societal expectations of AI) identified?", "Is the AI context reviewed when significant changes occur?", "Are factors linked to AI-specific risks and opportunities?"], "e": "AIMS Context Analysis, PESTLE/SWOT for AI, Regulatory AI Landscape Map, Internal Capability Assessment", "sec": "CLAUSE 4 — CONTEXT OF THE ORGANIZATION"}, {"i": "42001-4.2", "t": "Interested Parties & Their Requirements", "d": "Identify all stakeholders relevant to the AIMS — including those affected by AI decisions — and understand their requirements and concerns regarding responsible AI.", "s": ["List all interested parties relevant to AI use (internal and external)", "For each party, document their requirements and concerns about AI use", "Explicitly include data subjects — those affected by AI-driven decisions", "Map regulatory and contractual AI obligations per stakeholder", "Review register annually or when AI scope changes"], "q": ["Are all interested parties identified (customers, employees, regulators, affected communities, suppliers)?", "Are their AI-related requirements and expectations documented?", "Are data subjects (people affected by AI decisions) considered as interested parties?", "Is the register reviewed periodically?"], "e": "AI Stakeholder Register, Requirements & Expectations Matrix, Data Subject Impact Mapping, Regulatory Requirements Register", "sec": "CLAUSE 4 — CONTEXT OF THE ORGANIZATION"}, {"i": "42001-4.3", "t": "Determining the Scope of the AIMS", "d": "Define and document the boundaries and applicability of the AI Management System, specifying which AI systems, processes, and organizational units are covered.", "s": ["Inventory all AI systems developed, procured, or deployed by the organization", "Define scope boundaries: which AI systems, business units, and geographies are included", "Document justified exclusions", "Reference context analysis (4.1) and stakeholder requirements (4.2) in scope definition", "Get senior management approval of scope statement", "Publish and communicate scope to relevant staff"], "q": ["Is the AIMS scope formally documented and approved?", "Does the scope specify which AI systems are included?", "Are exclusions from scope documented with justification?", "Is the scope communicated to relevant stakeholders?"], "e": "AIMS Scope Statement, AI System Inventory (in-scope), Exclusion Justifications, Management Approval Record", "sec": "CLAUSE 4 — CONTEXT OF THE ORGANIZATION"}, {"i": "42001-4.4", "t": "AI Management System", "d": "Establish, implement, maintain, and continually improve an AI Management System including all required processes and their interactions.", "s": ["Define the AIMS process architecture and process interactions", "Document the AIMS in an AI Management System Manual", "Identify integration points with existing management systems (ISO 27001, ISO 9001, etc.)", "Assign process owners for all AIMS processes", "Implement PDCA (Plan-Do-Check-Act) cycle for continual improvement", "Conduct initial AIMS review at 3-month and 6-month milestones"], "q": ["Is the AIMS established and operational?", "Are AIMS processes defined with inputs, outputs, and owners?", "Is the AIMS integrated with existing management systems (e.g., ISO 27001 ISMS)?", "Is there evidence of continual improvement?"], "e": "AIMS Manual or Framework Document, Process Map, Integration Evidence with Existing MS, Improvement Records", "sec": "CLAUSE 4 — CONTEXT OF THE ORGANIZATION"}, {"i": "42001-5.1", "t": "Leadership & Commitment", "d": "Top management must demonstrate leadership and commitment to the AIMS by setting AI policy, ensuring resources, integrating AI governance into business processes, and promoting a culture of responsible AI.", "s": ["Brief top management on ISO 42001 requirements and business case for responsible AI", "Secure formal leadership commitment and budget allocation", "Assign an AI governance lead or committee with executive sponsorship", "Integrate AI governance into the organizational strategy and risk management", "Ensure leadership participates in AIMS reviews (minimum annually)"], "q": ["Has top management formally approved the AI policy?", "Are resources (budget, staff, tools) allocated to AIMS?", "Does leadership actively promote responsible AI culture?", "Is AI governance integrated into strategic planning?", "Does leadership review AIMS performance?"], "e": "AI Policy with Executive Signature, Resource Allocation Records, AI Governance in Strategic Plan, Leadership Review Minutes", "sec": "CLAUSE 5 — LEADERSHIP"}, {"i": "42001-5.2", "t": "AI Policy", "d": "Establish, approve, and communicate an AI policy that sets the organization's position on responsible AI use, including commitments to ethical principles, legal compliance, and continual improvement.", "s": ["Draft AI policy covering: purpose, scope, ethical principles, regulatory commitment, continual improvement", "Align policy to applicable AI regulations (EU AI Act, national AI frameworks)", "Reference relevant standards (ISO 42001, NIST AI RMF, OECD AI Principles)", "Get top management approval", "Communicate policy to all staff and publish externally where appropriate", "Schedule annual policy review"], "q": ["Is an AI policy documented and approved by top management?", "Does the policy address ethical AI principles (fairness, transparency, accountability, safety)?", "Is the policy appropriate to the organization's AI context?", "Is the policy communicated to all staff and relevant external parties?", "Is there a commitment to comply with applicable AI regulations?"], "e": "AI Policy Document, Approval Record, Communication Evidence, Staff Acknowledgments, Regulatory Compliance Commitment", "sec": "CLAUSE 5 — LEADERSHIP"}, {"i": "42001-5.3", "t": "Roles, Responsibilities & Authorities", "d": "Define and communicate roles, responsibilities, and authorities for AI governance to ensure the AIMS operates effectively and accountability for AI systems is clear.", "s": ["Define AI governance roles: AI Officer (or equivalent), AI Ethics Committee, AI system owners, data owners", "Document responsibilities and authorities for each role", "Assign named individuals to all AI governance roles", "Communicate role assignments organization-wide", "Review and update roles when AI scope or structure changes"], "q": ["Are AI governance roles defined (AI Officer, AI Ethics Board, AI system owners)?", "Are responsibilities for each AI system clearly assigned?", "Are role descriptions communicated to relevant individuals?", "Is there accountability at both strategic and operational AI levels?"], "e": "AI Governance RACI Matrix, Role Descriptions, Assignment Letters/Job Descriptions, Org Chart with AI Governance", "sec": "CLAUSE 5 — LEADERSHIP"}, {"i": "42001-6.1", "t": "Actions to Address Risks & Opportunities", "d": "Identify and address AI-specific risks and opportunities, including risks of harm from AI systems, bias, inaccuracy, misuse, and failure to meet stakeholder expectations.", "s": ["Define AI risk categories: technical (model failure, accuracy), ethical (bias, fairness), legal (non-compliance, liability), operational (availability, security)", "Assess risks using likelihood × impact methodology", "Prioritize risks and document in AI risk register", "Develop treatment plans for high and critical risks", "Identify and document opportunities (trust building, competitive advantage, efficiency)", "Review risk register quarterly"], "q": ["Are AI-specific risks identified (bias, hallucination, data poisoning, misuse, explainability failure)?", "Are risks assessed for likelihood and impact?", "Are treatment actions planned for significant risks?", "Are opportunities from responsible AI use identified?"], "e": "AI Risk Register, AI Risk Assessment Methodology, Risk Treatment Plans, Opportunities Register", "sec": "CLAUSE 6 — PLANNING"}, {"i": "42001-6.1.2", "t": "AI Risk Assessment", "d": "Conduct structured AI risk assessments that evaluate risks associated with AI systems throughout their lifecycle — from design and training through deployment and decommissioning.", "s": ["Define AI risk assessment methodology covering all lifecycle stages", "Identify AI-specific threat categories (model attacks, data quality, algorithmic bias, interpretability)", "Conduct AI risk assessment before deploying any new AI system", "Reassess when AI model is retrained, updated, or scope expands", "Document results and link to risk treatment decisions", "Maintain record of all AI risk assessments by system version"], "q": ["Is an AI risk assessment methodology defined?", "Are assessments conducted for all AI systems before deployment?", "Do assessments cover the full AI lifecycle?", "Are assessments updated when AI systems change significantly?", "Are results used to drive design and control decisions?"], "e": "AI Risk Assessment Methodology, Completed AI Risk Assessments per System, Lifecycle Risk Mapping, Pre-deployment Assessment Checklists", "sec": "CLAUSE 6 — PLANNING"}, {"i": "42001-6.1.3", "t": "AI Impact Assessment", "d": "Assess the potential impact of AI systems on individuals and society, particularly for AI systems making or supporting consequential decisions.", "s": ["Define AI impact assessment (AIA) methodology and threshold criteria for when an AIA is required", "Conduct AIA for all AI systems with consequential decision-making capability", "Assess impact on vulnerable groups, minority populations, and marginalized communities", "Consult relevant stakeholders during AIA process", "Document AIA outcomes and required mitigations", "Review AIAs when AI system scope, data, or use changes significantly"], "q": ["Is an AI impact assessment (AIA) process defined?", "Are AIAs conducted for AI systems with significant societal or individual impact?", "Do AIAs consider vulnerable groups and differential impacts?", "Are AIA results documented and acted on?", "Are stakeholders and affected communities consulted?"], "e": "AI Impact Assessment Methodology, Completed AIAs, Stakeholder Consultation Records, Mitigation Evidence, High-Risk AI Register", "sec": "CLAUSE 6 — PLANNING"}, {"i": "42001-6.2", "t": "AIMS Objectives & Planning", "d": "Establish measurable AI management system objectives aligned with the AI policy, and plan how to achieve them with defined actions, resources, timelines, and success metrics.", "s": ["Define AIMS objectives aligned to AI policy (e.g., 100% of AI systems risk-assessed before deployment, AI incident response time ≤4 hours)", "Ensure objectives are SMART (Specific, Measurable, Achievable, Relevant, Time-bound)", "Assign owners and target dates to each objective", "Build tracking mechanism for objective progress", "Report objective status at management review", "Update objectives annually and when AI strategy changes"], "q": ["Are AIMS objectives documented and measurable?", "Are objectives consistent with the AI policy?", "Are plans in place to achieve each objective?", "Is progress tracked and reported?", "Are objectives reviewed at management reviews?"], "e": "AIMS Objectives Register, Objective Achievement Plans, Progress Tracking Reports, Management Review Inputs", "sec": "CLAUSE 6 — PLANNING"}, {"i": "42001-6.1.4", "t": "Treatment of AI Risks", "d": "Select and implement appropriate treatment options for identified AI risks, including technical controls, governance controls, and process safeguards.", "s": ["Select treatment option per AI risk (accept, avoid, reduce, share/transfer)", "For reduce: implement technical controls (model testing, bias detection, adversarial testing)", "For reduce: implement governance controls (human-in-the-loop, ethics review, approval gates)", "Assign owners and target dates to all treatment actions", "Track treatment implementation in AI risk register", "Assess and document residual risk post-treatment", "Escalate unacceptable residual risks to management for decision"], "q": ["Is a treatment option selected for each significant AI risk?", "Are treatment plans documented with actions, owners, and target dates?", "Are technical controls (model validation, testing, monitoring) implemented?", "Are governance controls (human oversight, review boards) implemented?", "Is residual risk assessed after treatment?"], "e": "AI Risk Treatment Plans, Technical Control Evidence, Governance Control Evidence, Residual Risk Assessments, Treatment Tracking", "sec": "CLAUSE 6 — PLANNING"}, {"i": "42001-7.1", "t": "Resources", "d": "Provide adequate resources for the establishment, implementation, maintenance, and continual improvement of the AIMS, including human resources, tools, and infrastructure.", "s": ["Define resource requirements for AIMS (personnel, budget, tools, infrastructure)", "Secure management approval for AIMS resource allocation", "Assign qualified staff to AI governance roles", "Procure or develop AI governance tools (risk assessment templates, bias detection, monitoring)", "Review resource adequacy at management review annually"], "q": ["Are dedicated resources allocated to AI governance and AIMS?", "Is there budget for AI risk assessments, audits, and tools?", "Are qualified personnel available for AI governance?", "Are infrastructure resources sufficient for responsible AI operation?"], "e": "AIMS Budget Allocation, Staffing Plan, AI Governance Tool Inventory, Resource Review Records", "sec": "CLAUSE 7 — SUPPORT"}, {"i": "42001-7.2", "t": "Competence", "d": "Ensure personnel involved in AI development, deployment, and governance have the necessary competence through education, training, or experience.", "s": ["Define competence requirements per AI role (developer, data scientist, AI officer, reviewer, end-user)", "Assess current competence levels against requirements", "Identify competence gaps and develop training programme", "Deliver training: AI ethics, bias detection, AI risk management, AI regulations (EU AI Act)", "Record all training completions", "Review competence annually and on role/system changes"], "q": ["Are competence requirements defined for AI roles?", "Are staff assessed for current AI competence?", "Is an AI training programme in place?", "Are training records maintained?", "Is competence reviewed when AI systems or roles change?"], "e": "AI Competence Framework, Competence Gap Analysis, Training Programme, Training Completion Records, Certification Evidence", "sec": "CLAUSE 7 — SUPPORT"}, {"i": "42001-7.3", "t": "Awareness", "d": "Ensure all relevant personnel are aware of the AI policy, their contribution to AIMS effectiveness, and the implications of non-conformity with AIMS requirements.", "s": ["Develop AI awareness programme covering: AI policy, ethical principles, responsible use guidelines, reporting concerns", "Deliver awareness training to all staff using AI systems or AI-generated outputs", "Require annual AI policy acknowledgment", "Include AI awareness in onboarding for new staff", "Assess awareness effectiveness via quiz or survey annually"], "q": ["Are staff aware of the AI policy and its implications for their role?", "Are staff trained on responsible AI use?", "Do staff understand consequences of AI misuse or non-conformity?", "Is AI awareness measured or tested?"], "e": "AI Awareness Training Records, AI Policy Acknowledgments, Awareness Assessment Results, Communication Records", "sec": "CLAUSE 7 — SUPPORT"}, {"i": "42001-7.4", "t": "Communication", "d": "Determine and implement internal and external communication relevant to the AIMS, including what to communicate about AI governance, to whom, when, and how.", "s": ["Define AIMS communication plan (what, to whom, when, how, by whom)", "Implement regular internal AI governance communications (newsletters, briefings, intranet)", "Define external communications: AI use disclosures, transparency reports, privacy notices updated for AI", "Communicate AI-related incidents and significant changes to relevant parties", "Review communication plan annually"], "q": ["Is there a defined communication plan for AIMS?", "Are internal AI governance communications regular and effective?", "Is external communication about AI use transparent and accessible?", "Are communications reviewed for accuracy and appropriateness?"], "e": "AIMS Communication Plan, Internal Communication Records, External AI Use Disclosures, Stakeholder Notifications", "sec": "CLAUSE 7 — SUPPORT"}, {"i": "42001-7.5", "t": "Documented Information", "d": "Maintain the documented information required by ISO 42001, including AI policy, risk assessments, impact assessments, system records, and evidence of AIMS operation.", "s": ["Define required AIMS documented information based on ISO 42001 requirements", "Implement document control procedure (versioning, approval, distribution, retention)", "Store documented information in controlled system (document management or SharePoint)", "Define retention periods for AIMS records (minimum 3 years recommended)", "Restrict editing of controlled documents to authorized personnel", "Review document register quarterly for completeness and currency"], "q": ["Is required documented information defined and maintained?", "Are documents controlled (version, approval, distribution)?", "Is documented information protected from unauthorized changes?", "Is obsolete documented information prevented from unintended use?", "Are records retained for a defined period?"], "e": "Document Control Procedure, Document Register, Version History, Retention Schedule, Access Controls on Document System", "sec": "CLAUSE 7 — SUPPORT"}, {"i": "42001-8.1", "t": "Operational Planning & Control", "d": "Plan, implement, control, and review processes needed to meet AIMS requirements and achieve AIMS objectives, including controls on AI system development, procurement, and deployment.", "s": ["Document operational processes for AI system development, procurement, deployment, and decommissioning", "Define criteria for acceptable AI system design (fairness, accuracy, explainability, security)", "Implement controls at each lifecycle stage (design review, pre-deployment testing, post-deployment monitoring)", "Define and enforce controls on outsourced AI development and third-party AI tools", "Maintain operational records demonstrating control execution"], "q": ["Are operational AI processes documented and controlled?", "Are criteria defined for AI system design and development?", "Are controls in place across the full AI lifecycle?", "Are operational records maintained?", "Are outsourced AI processes controlled?"], "e": "AI Operational Procedures, AI Lifecycle Process Controls, Outsourced AI Controls, Operational Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.2", "t": "AI System Inventory & Classification", "d": "Maintain a complete inventory of all AI systems, classified by risk level, intended use, and impact on individuals, to enable appropriate governance and control.", "s": ["Inventory all AI systems: developed in-house, procured, and embedded in third-party tools", "For each system, document: name, vendor/owner, purpose, data inputs, output type, decision impact", "Classify each system by risk level using EU AI Act or equivalent classification", "Map each system to applicable regulations and standards", "Assign an accountable owner per AI system", "Review and update inventory quarterly and on procurement of new AI tools"], "q": ["Is there a complete AI system inventory?", "Are AI systems classified by risk level (limited, high-risk, unacceptable)?", "Are intended uses and actual uses documented?", "Is the inventory reviewed and updated regularly?", "Are AI systems mapped to applicable regulations?"], "e": "AI System Inventory, AI Risk Classification Register, Intended Use Documentation, Regulatory Mapping per System", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.3", "t": "AI System Design & Development Controls", "d": "Implement controls over the design and development of AI systems to ensure they meet ethical, technical, and regulatory requirements from inception.", "s": ["Define AI development standards incorporating responsible AI principles", "Require bias and fairness assessment during model training and validation", "Define minimum model performance thresholds per use case", "Implement explainability requirements: document how the model reaches decisions", "Conduct adversarial testing and robustness checks before deployment", "Require pre-deployment sign-off from AI governance role", "Document all design and development decisions in model cards or system documentation"], "q": ["Are responsible AI principles embedded in the AI development process?", "Are fairness and bias assessments conducted during development?", "Is model performance validated before deployment?", "Is explainability/interpretability addressed at design stage?", "Are security requirements (adversarial robustness) included?"], "e": "AI Development Standards, Bias Assessment Reports, Model Validation Records, Explainability Documentation, Security Test Results", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.4", "t": "AI System Procurement & Third-Party AI", "d": "Apply due diligence to the procurement of AI systems and tools from third parties to ensure they meet the organization's responsible AI requirements.", "s": ["Develop AI procurement due diligence checklist (covering ethics, bias testing, explainability, data handling, compliance)", "Assess all AI vendor responses against the checklist before contract award", "Include AI governance requirements in procurement contracts (responsible AI standards, audit rights, incident notification)", "Add all procured AI systems to the AI system inventory", "Monitor third-party AI risks on a defined schedule (minimum annually)"], "q": ["Is there a due diligence process for procuring AI systems?", "Are vendor AI ethics and governance practices assessed?", "Are contractual AI requirements included in procurement contracts?", "Is third-party AI covered by the AIMS?", "Are ongoing third-party AI risks monitored?"], "e": "AI Procurement Due Diligence Checklist, Vendor AI Governance Assessments, Contract AI Clauses, Third-Party AI Risk Register", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.5", "t": "AI System Deployment & Human Oversight", "d": "Control AI system deployment and ensure appropriate human oversight is maintained, particularly for AI systems making or informing consequential decisions.", "s": ["Define deployment approval process requiring sign-off from AI governance and business owner", "Document human oversight mechanism for each deployed AI system", "Implement technical ability for humans to override, pause, or correct AI decisions", "Train end-users on how AI system works, its limitations, and how to escalate concerns", "Document deployment decisions including override of risk treatment recommendations", "Monitor deployment against intended use — flag scope creep"], "q": ["Is there a formal deployment approval process for AI systems?", "Are human oversight mechanisms defined per AI system?", "Can humans override or intervene in AI decisions?", "Are deployment decisions documented?", "Are end-users trained on AI system use and limitations?"], "e": "AI Deployment Approval Records, Human Oversight Procedures, Override/Intervention Mechanisms, User Training Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.6", "t": "AI System Monitoring & Performance Management", "d": "Monitor deployed AI systems continuously for performance degradation, data drift, bias emergence, and deviation from intended use.", "s": ["Define monitoring plan per AI system (what metrics, what frequency, what thresholds)", "Implement technical monitoring for: accuracy, precision/recall, data drift, output distribution, bias metrics", "Define alert thresholds that trigger model review or retraining", "Review monitoring results at defined frequency (minimum monthly for high-impact systems)", "Document and act on monitoring findings", "Retrain or retire AI system when performance falls below acceptable thresholds"], "q": ["Are AI systems monitored for performance post-deployment?", "Is data drift and model drift detected?", "Are fairness and bias metrics monitored over time?", "Are monitoring results reviewed regularly?", "Are thresholds defined for triggering review or remediation?"], "e": "AI Monitoring Plan, Monitoring Dashboard, Performance & Fairness Metrics, Drift Detection Reports, Remediation Records", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.7", "t": "AI Incident Management", "d": "Define and implement a process for identifying, reporting, investigating, and resolving AI-related incidents including harmful outputs, bias events, failures, and misuse.", "s": ["Define AI incident types: harmful output, model failure, bias event, data poisoning, misuse, regulatory breach", "Create AI incident response process (detect → report → assess → contain → investigate → remediate → learn)", "Set up AI incident register separate from general IT incident log", "Define stakeholder notification requirements per incident type (regulators, affected individuals, management)", "Conduct root cause analysis for all significant AI incidents", "Implement lessons learned from each incident and update AIMS accordingly"], "q": ["Is an AI incident response process defined?", "Are AI incidents classified and tracked separately from general IT incidents?", "Are incident root causes investigated and addressed?", "Are affected stakeholders notified where required?", "Are lessons learned used to improve the AIMS?"], "e": "AI Incident Response Process, AI Incident Register, Root Cause Analysis Records, Stakeholder Notification Evidence, Lessons Learned Register", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-8.8", "t": "AI System Decommissioning", "d": "Manage the decommissioning of AI systems in a controlled manner, including data retention/deletion, documentation archival, and communication to users.", "s": ["Define AI system decommissioning process as part of AI lifecycle management", "Notify all users and stakeholders before decommissioning with defined notice period", "Determine data retention vs. deletion requirements per regulatory obligations", "Securely dispose of training data and model artifacts not required for retention", "Archive model documentation (model card, risk assessments, audit trail) per retention schedule", "Document completion of decommissioning"], "q": ["Is there a formal AI system decommissioning process?", "Is training data and model artifact disposal managed securely?", "Are users notified before decommissioning?", "Is decommissioning documented?", "Are regulatory obligations for data retention met?"], "e": "AI Decommissioning Procedure, Decommissioning Records, Data Disposal Evidence, User Notification Records, Regulatory Retention Compliance", "sec": "CLAUSE 8 — OPERATION"}, {"i": "42001-9.1", "t": "Monitoring, Measurement & Evaluation", "d": "Define what needs to be monitored and measured regarding the AIMS, establish methods for analysis and evaluation, and review results to drive improvement.", "s": ["Define AIMS KPIs (e.g., % AI systems with completed risk assessment, AI incident response time, AI bias metric scores, % staff trained)", "Implement data collection for each KPI (automated where possible)", "Produce monthly/quarterly AIMS performance reports", "Report performance to management and relevant stakeholders", "Use evaluation results to identify improvement priorities", "Review KPI framework annually"], "q": ["Are AIMS KPIs and metrics defined?", "Is monitoring data collected and analyzed at defined intervals?", "Are evaluation results reported to relevant stakeholders?", "Is the monitoring programme reviewed for effectiveness?"], "e": "AIMS KPI Definitions, Monitoring & Measurement Plan, Evaluation Reports, Stakeholder Reports", "sec": "CLAUSE 9 — PERFORMANCE EVALUATION"}, {"i": "42001-9.2", "t": "Internal Audit", "d": "Conduct internal audits of the AIMS at planned intervals to provide information on whether the system conforms to ISO 42001 requirements and is effectively implemented.", "s": ["Develop annual AIMS internal audit programme covering all clauses and processes", "Ensure auditor independence and competence in AI management and ISO 42001", "Conduct audits per programme (full cycle within 12 months)", "Document audit findings: conformities, nonconformities, observations, and opportunities", "Report audit results to top management", "Track all nonconformities to corrective action closure", "Review audit programme annually"], "q": ["Is an internal audit programme defined for the AIMS?", "Are auditors competent and independent from the areas being audited?", "Are audit findings documented and reported to management?", "Are nonconformities followed up and corrected?", "Is the audit programme reviewed for effectiveness?"], "e": "AIMS Audit Programme, Audit Plans, Audit Reports, Nonconformity Log, Corrective Action Records, Auditor Competence Evidence", "sec": "CLAUSE 9 — PERFORMANCE EVALUATION"}, {"i": "42001-9.3", "t": "Management Review", "d": "Top management must review the AIMS at planned intervals to ensure its continuing suitability, adequacy, effectiveness, and alignment with the strategic direction of the organization.", "s": ["Schedule annual management review (more frequently for early AIMS implementation)", "Define review inputs: audit results, KPI performance, risk register, incidents, stakeholder feedback, regulatory changes", "Conduct structured review with top management participation", "Document decisions and action items with owners and deadlines", "Track actions to completion", "Use review outputs to update AIMS objectives and improvement priorities"], "q": ["Is a management review conducted at least annually?", "Does the review cover all required inputs (audit results, performance, risks, objectives, changes)?", "Are decisions and actions from reviews documented?", "Are review outputs used to drive AIMS improvement?"], "e": "Management Review Schedule, Review Agenda, Review Minutes and Outputs, Action Register, Sign-off by Top Management", "sec": "CLAUSE 9 — PERFORMANCE EVALUATION"}, {"i": "42001-10.1", "t": "Nonconformity & Corrective Action", "d": "When a nonconformity occurs, react to it, take action to control and correct it, investigate root causes, and implement corrective actions to prevent recurrence.", "s": ["Define nonconformity identification and reporting process (from audits, incidents, monitoring, complaints)", "Record all nonconformities in centralized register", "Conduct root cause analysis for all significant nonconformities", "Develop and implement corrective action plans with owners and target dates", "Verify effectiveness of corrective actions after implementation", "Share lessons learned across teams to prevent recurrence", "Review nonconformity trends at management review"], "q": ["Is there a defined nonconformity and corrective action process?", "Are nonconformities documented and tracked?", "Is root cause analysis performed for significant nonconformities?", "Are corrective actions verified for effectiveness?", "Are lessons learned shared across the organization?"], "e": "Nonconformity Register, Root Cause Analysis Records, Corrective Action Plans, Effectiveness Verification Evidence, Lessons Learned Log", "sec": "CLAUSE 10 — IMPROVEMENT"}, {"i": "42001-10.2", "t": "Continual Improvement", "d": "Continually improve the suitability, adequacy, and effectiveness of the AIMS by taking actions based on performance data, audits, incidents, and emerging AI risks and standards.", "s": ["Establish AIMS improvement register to capture ideas from all sources", "Define improvement intake channels: audits, incidents, management reviews, staff suggestions, regulatory updates, emerging AI risks", "Prioritize improvements by impact on AI risk posture and AIMS objectives", "Assign owners and target dates to all improvement actions", "Track and report improvement implementation progress quarterly", "Validate improvements through subsequent monitoring, audit, or measurement", "Present improvement outcomes at annual management review"], "q": ["Is there a formal continual improvement process for the AIMS?", "Are improvement ideas captured from multiple sources?", "Are improvements prioritized and tracked?", "Is improvement progress reported to management?", "Are improvements validated through subsequent performance evaluation?"], "e": "AIMS Improvement Register, Improvement Source Records (audits, incidents, reviews), Prioritization Evidence, Improvement Tracking, Validation Records", "sec": "CLAUSE 10 — IMPROVEMENT"}, {"i": "42001-A.2.2", "t": "AI Policy for Internal Use of AI", "d": "Establish specific policies governing how AI is used internally by employees, covering acceptable use, restrictions, data handling, and accountability.", "s": ["Develop Internal AI Acceptable Use Policy", "Define approved AI tools and prohibited uses", "Specify data handling restrictions (e.g., no confidential data in public AI tools without approval)", "Address shadow AI: process for staff to request approval of new AI tools", "Require annual staff acknowledgment", "Implement process to detect and manage shadow AI use"], "q": ["Is an internal AI acceptable use policy in place?", "Does it cover which AI tools are approved for use?", "Are restrictions on using confidential data with external AI tools documented?", "Is the policy acknowledged by all staff?", "Is shadow AI use addressed?"], "e": "Internal AI Acceptable Use Policy, Approved AI Tools List, Staff Acknowledgments, Shadow AI Detection Process", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.3.2", "t": "Roles & Responsibilities for AI Systems", "d": "Define specific roles and responsibilities for each AI system, including accountable owner, data owner, model owner, and operational owner.", "s": ["For each AI system, assign: Accountable Owner (business), Model Owner (technical), Data Owner, Operational Owner", "Document responsibilities per role", "Communicate assignments to all AI system owners", "Train owners on their responsibilities under ISO 42001 and the AI policy", "Review ownership annually and on system changes"], "q": ["Is there an accountable owner assigned to each AI system?", "Are data, model, and operational ownership roles defined?", "Are responsibilities documented and communicated?", "Are owners trained on their responsibilities?"], "e": "AI System Ownership Register, Role Descriptions, Assignment Records, Owner Training Evidence", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.4.2", "t": "AI-Specific Risk Assessment Process", "d": "Implement an AI-specific risk assessment process that addresses unique AI risks beyond conventional IT risks, including model risks, data quality risks, and societal impacts.", "s": ["Develop AI-specific risk assessment methodology extending beyond conventional IT risk", "Define AI risk categories: model performance, data quality, algorithmic bias, adversarial threats, societal impact, regulatory", "Create AI risk assessment templates per AI system type", "Build an AI threat and vulnerability library specific to your AI use cases", "Apply methodology consistently to all AI systems", "Train risk assessors on AI-specific risk identification techniques"], "q": ["Does the AI risk assessment cover model-specific risks (drift, bias, hallucination)?", "Are data quality and provenance risks assessed?", "Are societal and individual impact risks included?", "Are AI-specific attack vectors (adversarial inputs, data poisoning) assessed?", "Is the methodology documented and applied consistently?"], "e": "AI-Specific Risk Assessment Methodology, AI Risk Assessment Templates, Completed Assessments, AI Attack Vector Library", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.5.2", "t": "Processes to Support Responsible AI Development", "d": "Implement development processes that embed responsible AI principles — including fairness, transparency, privacy, safety, and reliability — at each stage of the AI development lifecycle.", "s": ["Define responsible AI development framework with gates at each SDLC phase", "Define fairness metrics per AI system use case (demographic parity, equalized odds, etc.)", "Implement explainability: document model decision logic and provide explanations to affected individuals where required", "Apply privacy-by-design to AI training data pipelines (data minimization, anonymization, access control)", "Define safety requirements for AI systems with consequential outputs", "Document responsible AI compliance in model cards before deployment"], "q": ["Are responsible AI principles embedded in the SDLC for AI?", "Are fairness metrics defined and tested for each AI system?", "Is transparency (explainability) designed into AI systems where applicable?", "Is privacy-by-design applied to AI data pipelines?", "Are safety requirements defined for AI systems with physical or high-impact outputs?"], "e": "Responsible AI Development Framework, Fairness Metrics per System, Explainability Documentation, Privacy-by-Design Evidence, Safety Requirements", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.6.1", "t": "Data Management for AI", "d": "Implement data management controls to ensure that data used for AI training, validation, and operation is accurate, appropriate, representative, and governed in accordance with applicable regulations.", "s": ["Define AI data management policy covering collection, quality, representativeness, retention, and disposal", "Conduct data quality assessment for all AI training datasets", "Analyze training data for representativeness and potential biases", "Document data lineage from source to model training", "Apply privacy controls to training data (pseudonymization, consent verification, minimization)", "Review training data governance before each model retraining", "Maintain audit trail of training data versions used per model version"], "q": ["Is training data documented and quality-assessed?", "Is training data representative of the intended population?", "Are data biases identified and addressed?", "Is data lineage tracked?", "Is training data handled in compliance with privacy regulations?"], "e": "AI Data Management Policy, Data Quality Assessments, Representativeness Analysis, Bias Detection Results, Data Lineage Records, Privacy Compliance Evidence", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.6.2", "t": "Data Acquisition & Labelling Controls", "d": "Control the acquisition and labelling of training data to ensure quality, representativeness, appropriate consent, and absence of harmful bias.", "s": ["Define data acquisition policy including legal basis, consent, and representativeness requirements", "Establish labelling quality standards and guidelines for labellers", "Implement inter-rater reliability measurement for human-labelled datasets", "Apply same quality and ethical standards to outsourced data labelling", "Document legal basis for all training data acquisition", "Maintain records of data acquisition sources and methods per model version"], "q": ["Is data acquisition governed by a defined process?", "Are labelling quality controls in place?", "Is inter-rater reliability assessed for human-labelled data?", "Are legal bases for data acquisition documented?", "Is outsourced labelling subject to the same quality and ethical standards?"], "e": "Data Acquisition Policy, Labelling Quality Standards, Inter-rater Reliability Records, Legal Basis Documentation, Third-Party Labelling Controls", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.8.2", "t": "Logging & Monitoring of AI Systems", "d": "Implement logging and monitoring of AI system inputs, outputs, and decisions to enable auditability, anomaly detection, incident investigation, and performance management.", "s": ["Define logging requirements per AI system: inputs, outputs, confidence scores, decision rationale (where applicable)", "Implement logging infrastructure for all deployed AI systems", "Define log retention period (minimum 12 months for high-risk AI systems)", "Implement anomaly detection on AI output patterns", "Protect AI logs from unauthorized access and modification", "Review logging coverage when AI models are updated or retrained"], "q": ["Are AI system inputs and outputs logged?", "Are logs retained for a defined period?", "Are anomalies in AI behavior detected and alerted?", "Are logs protected from unauthorized access or modification?", "Is logging coverage reviewed when AI systems change?"], "e": "AI Logging Specification, Log Retention Policy, Anomaly Detection Configuration, Log Protection Evidence, Log Coverage Map", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.9.1", "t": "Testing of AI Systems", "d": "Conduct comprehensive testing of AI systems before deployment and after significant changes, covering functional performance, fairness, robustness, safety, and security.", "s": ["Define AI testing framework covering: functional performance, fairness/bias, robustness, adversarial, safety, and security", "Conduct functional performance testing against defined accuracy/performance thresholds", "Run fairness tests across demographic subgroups relevant to the use case", "Conduct adversarial testing (input perturbation, boundary testing)", "Test for known AI attack vectors (prompt injection for LLMs, data poisoning detection)", "Document all test results in a test report", "Require test sign-off from AI governance role before deployment", "Repeat testing after any significant model update or data change"], "q": ["Is a structured AI testing process defined?", "Are fairness and bias tests conducted?", "Are adversarial and robustness tests performed?", "Is testing evidence documented and retained?", "Is testing repeated after model updates?"], "e": "AI Testing Framework, Fairness Test Results, Adversarial Test Results, Performance Benchmarks, Test Sign-off Records", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.10.1", "t": "Transparency & Explainability", "d": "Provide appropriate transparency about AI system use to affected individuals and stakeholders, and ensure AI decisions can be explained to the degree required by context and regulation.", "s": ["Identify all AI systems making or influencing consequential decisions affecting individuals", "Implement transparency notices informing individuals when AI is used", "Define explanation procedures: how explanations are generated and delivered on request", "Document model decision logic in model cards or system documentation", "Test explainability: ensure explanations are accurate, understandable, and actionable", "Scale transparency obligations to risk level: higher-risk AI requires more detailed explanations"], "q": ["Are individuals notified when AI is used in decisions affecting them?", "Can AI decisions be explained to affected individuals on request?", "Is documentation of how AI systems make decisions available internally?", "Is transparency proportional to the risk and impact of the AI system?"], "e": "Transparency Notices, Explanation Procedures, Model Documentation (Model Cards), Explainability Test Evidence", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}, {"i": "42001-A.10.2", "t": "Communication About AI System Capabilities & Limitations", "d": "Communicate clearly and honestly to users and stakeholders about what AI systems can and cannot do, their known limitations, and the circumstances in which they should not be relied upon.", "s": ["Document known limitations for each AI system (accuracy bounds, edge cases, failure modes)", "Include limitations disclosure in all user-facing AI documentation", "Train users to critically evaluate AI outputs and recognize signs of error", "Implement feedback mechanisms for users to report AI errors or unexpected outputs", "Disclose known bias or uncertainty in model documentation", "Update limitations documentation when new limitations are discovered through monitoring or incidents"], "q": ["Are AI system limitations documented and communicated to users?", "Are users trained not to over-rely on AI outputs?", "Is known AI system bias or uncertainty disclosed?", "Are limitations included in user documentation and training?"], "e": "AI System Limitations Documentation, User Training Materials, Disclosure Notices, User Feedback on AI Limitations", "sec": "ANNEX A — OBJECTIVES & CONTROLS FOR AI SYSTEMS"}]};

const fwHue=(fw)=>{const i=Math.max(0,FRAMEWORKS.indexOf(fw));return Math.round((i*360)/Math.max(1,FRAMEWORKS.length));};
const fwSolid=(fw)=>`hsl(${fwHue(fw)} 70% 45%)`;
const fwSoft=(fw,a=0.12)=>`hsla(${fwHue(fw)},70%,45%,${a})`;
function findMatchesForArea(fw,areaDef){
  const kws=areaDef.kws||[];
  const items=RAW[fw]||[];
  const hits=[];
  for(const item of items){
    const hay=(item.i+" "+item.t+" "+item.d+" "+(item.s||[]).join(" ")).toLowerCase();
    let score=0;
    for(const kw of kws){ if(hay.includes(kw)) score++; }
    if(score>0) hits.push({id:item.i,score});
  }
  hits.sort((a,b)=>b.score-a.score||String(a.id).localeCompare(String(b.id)));
  return hits.slice(0,3).map(h=>h.id);
}

function getInitState(){
  const state={};
  for(const fw of FRAMEWORKS){state[fw]={};for(const item of RAW[fw])state[fw][item.i]={
    status:"Not Started",priority:"Medium",maturity:"0 — Non-existent",
    owner:"",targetDate:"",notes:"",
    stepsDone:item.s.map(()=>false),
    assessmentAnswers:item.q.map(()=>null),
    approval:{state:"none",requestedStatus:"",requestedBy:"",requestedAt:"",decidedBy:"",decidedAt:"",comment:""},
    exception:{state:"none",reason:"",expiry:"",requestedBy:"",requestedAt:"",decidedBy:"",decidedAt:"",comment:""},
    test:{procedure:"",frequency:"",lastDate:"",lastResult:""},
    budget:{effortHrs:"",costUSD:""},
    deps:[]
  };}
  return state;
}

function letterGrade(pct){if(pct>=90)return{g:"A",c:"#16a34a"};if(pct>=75)return{g:"B",c:"#22c55e"};if(pct>=60)return{g:"C",c:"#eab308"};if(pct>=40)return{g:"D",c:"#f97316"};return{g:"F",c:"#ef4444"};}
function today(){return new Date().toISOString().slice(0,10)}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}
function fmtDate(d){if(!d)return"—";const p=new Date(d);return p.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}

// ─── SAMPLE DATA BUILDER ─────────────────────────────────────────────────────
function buildSampleWorkspaceData(wsId){
  const controlState=getInitState();
  const plusDays=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  const rand=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
  const pick=(arr)=>arr[Math.floor(Math.random()*arr.length)];
  const weighted=(pairs)=>{
    const r=Math.random();let a=0;
    for(const [val,p] of pairs){a+=p;if(r<=a)return val;}
    return pairs[pairs.length-1][0];
  };
  const owners=["CISO","IT Ops","SOC Lead","Compliance Manager","Service Desk","Risk Owner","DPO","DevOps","HR","Finance","Internal Audit"];
  const maturityBy=(st)=>{
    if(st==="Compliant") return rand(3,5);
    if(st==="Implemented"||st==="Under Review") return rand(2,4);
    if(st==="In Progress") return rand(1,3);
    if(st==="Non-Compliant") return rand(0,2);
    return rand(0,2);
  };
  const makeStepsDone=(fw,id,st)=>{
    const cur=controlState[fw][id];
    const total=(cur.stepsDone||[]).length||0;
    const pct=st==="Compliant"?rand(80,100):st==="Implemented"?rand(60,90):st==="Under Review"?rand(60,85):st==="In Progress"?rand(20,70):st==="Non-Compliant"?rand(0,35):rand(0,25);
    const done=Math.round((pct/100)*total);
    return Array.from({length:total},(_,i)=>i<done);
  };
  const makeAssess=(fw,id,st)=>{
    const cur=controlState[fw][id];
    const n=(cur.assessmentAnswers||[]).length||0;
    const yesRate=st==="Compliant"?0.85:st==="Implemented"?0.7:st==="Under Review"?0.6:st==="In Progress"?0.45:st==="Non-Compliant"?0.25:0.15;
    const ans=[];
    for(let i=0;i<n;i++){
      const r=Math.random();
      if(r<0.15) ans.push(null);
      else ans.push(Math.random()<yesRate);
    }
    return ans;
  };

  // Populate all controls with realistic random demo data
  for(const fw of FRAMEWORKS){
    for(const item of RAW[fw]){
      const st=weighted([["Not Started",0.22],["In Progress",0.34],["Implemented",0.14],["Under Review",0.08],["Compliant",0.16],["Non-Compliant",0.06]]);
      const pr=weighted([["Low",0.22],["Medium",0.36],["High",0.28],["Critical",0.14]]);
      const m=MATURITY[maturityBy(st)]||"0 — Non-existent";
      controlState[fw][item.i]={
        ...controlState[fw][item.i],
        status:st,
        priority:pr,
        maturity:m,
        owner:Math.random()<0.85?pick(owners):"",
        targetDate:plusDays(rand(-25,60)),
        notes:Math.random()<0.18?"Demo note: evidence and testing scheduled.":"",
        stepsDone:makeStepsDone(fw,item.i,st),
        assessmentAnswers:makeAssess(fw,item.i,st),
      };
    }
  }

  // Add a few deterministic anchors for narrative (ISO 27001 + ITIL/ITSM/ISMS)
  const setSteps=(fw,id,doneIdx=[])=>{
    const st=controlState?.[fw]?.[id];if(!st)return;
    controlState[fw][id]={...st,stepsDone:(st.stepsDone||[]).map((_,i)=>doneIdx.includes(i))};
  };
  const setAssess=(fw,id,yesIdx=[],noIdx=[])=>{
    const st=controlState?.[fw]?.[id];if(!st)return;
    controlState[fw][id]={...st,assessmentAnswers:(st.assessmentAnswers||[]).map((_,i)=>{
      if(yesIdx.includes(i))return true;if(noIdx.includes(i))return false;return null;
    })};
  };
  const pickOne=(fw,id,patch)=>{if(controlState?.[fw]?.[id])controlState[fw][id]={...controlState[fw][id],...patch};};

  pickOne("ISO 27001","5.2",{status:"Compliant",priority:"High",owner:"CISO",targetDate:plusDays(-10),maturity:"3 — Defined",notes:"IS policy approved and communicated to all staff."});
  setSteps("ISO 27001","5.2",[0,1,2,3,4,5,6,7]);setAssess("ISO 27001","5.2",[0,1,2,3],[]);
  pickOne("ISO 27001","6.1.2",{status:"Non-Compliant",priority:"Critical",owner:"SOC Lead",targetDate:plusDays(-7),maturity:"1 — Initial",notes:"Risk methodology exists but not consistently applied; register incomplete."});
  setSteps("ISO 27001","6.1.2",[0,1]);setAssess("ISO 27001","6.1.2",[0],[1,2]);
  pickOne("ITIL 4","SMP-10",{status:"Compliant",priority:"Medium",owner:"Service Desk",targetDate:plusDays(-4),maturity:"3 — Defined",notes:"Incident process established with PIR routine."});
  pickOne("ITSM","SO-05",{status:"Compliant",priority:"High",owner:"IAM Team",targetDate:plusDays(-6),maturity:"3 — Defined",notes:"JML process automated; periodic access reviews quarterly."});
  pickOne("ISMS","Governance",{status:"Compliant",priority:"High",owner:"ISMS Manager",targetDate:plusDays(-2),maturity:"3 — Defined",notes:"Steering committee established and meeting monthly."});

  // Evidence arrays (per-control) — random but consistent lengths
  const evidence={};
  for(const fw of FRAMEWORKS){
    for(const item of RAW[fw]){
      const ev=String(item.e||"").split(",").map(x=>x.trim()).filter(Boolean);
      if(ev.length===0||ev[0]==="—") continue;
      const st=controlState[fw][item.i]?.status||"Not Started";
      const base=st==="Compliant"?0.75:st==="Implemented"?0.55:st==="In Progress"?0.35:st==="Under Review"?0.45:0.15;
      evidence[`${fw}::${item.i}`]=ev.map(()=>Math.random()<base);
    }
  }
  // Deterministic highlights
  evidence["ISO 27001::5.2"]=[true,true,true,true];

  return{
    controlState,
    branding:{company:"ACME Manufacturing Ltd.",logo:"",project:"Multi-Framework Compliance Programme — Demo Workspace"},
    snapshots:[],
    evidence,
    docs:[],capa:[],mappings:[],
    createdAt:nowISO()
  };
}

// ─── RADAR CHART ────────────────────────────────────────────────────────────
function RadarChart({labels,values,maxVal=5,size=240}){
  const cx=size/2,cy=size/2,r=size/2-30,n=labels.length;
  if(n<3)return null;
  const angle=(i)=>((Math.PI*2*i)/n)-Math.PI/2;
  const pts=(vals)=>vals.map((v,i)=>{const a=angle(i),d=(v/maxVal)*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)]});
  const poly=(p)=>p.map(([x,y])=>`${x},${y}`).join(' ');
  const dataPoints=pts(values);
  return(
    <svg width={size} height={size} style={{display:'block',margin:'0 auto'}}>
      {[1,2,3,4,5].map(lv=>{
        const p=pts(labels.map(()=>lv));
        return <polygon key={lv} points={poly(p)} fill="none" stroke="var(--border)" strokeWidth={lv===5?1.5:.5} strokeDasharray={lv<5?"2,2":"none"}/>;
      })}
      {labels.map((l,i)=>{
        const a=angle(i),ex=cx+(r+18)*Math.cos(a),ey=cy+(r+18)*Math.sin(a);
        return <g key={i}>
          <line x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="var(--border)" strokeWidth=".5"/>
          <text x={ex} y={ey} textAnchor="middle" dominantBaseline="central" fill="var(--text-secondary)" fontSize="9" fontFamily="Poppins">{l.length>14?l.slice(0,13)+'…':l}</text>
        </g>;
      })}
      <polygon points={poly(dataPoints)} fill="rgba(245,210,72,.18)" stroke="#F5D248" strokeWidth="2"/>
      {dataPoints.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={3.5} fill="#F5D248" stroke="var(--bg-card)" strokeWidth="2"/>)}
    </svg>
  );
}

    for(const fw of FRAMEWORKS){
      const items=RAW[fw],total=items.length;
      const byStatus={},byPriority={};
      STATUSES.forEach(s=>byStatus[s]=0);PRIORITIES.forEach(p=>byPriority[p]=0);
      let totalSteps=0,doneSteps=0,maturitySum=0;
      for(const item of items){
        const st=userState[fw]?.[item.i];if(!st)continue;
        byStatus[st.status]=(byStatus[st.status]||0)+1;
        byPriority[st.priority]=(byPriority[st.priority]||0)+1;
        totalSteps+=item.s.length;doneSteps+=(st.stepsDone||[]).filter(Boolean).length;
        maturitySum+=parseInt(st.maturity)||0;
      }
      r[fw]={total,byStatus,byPriority,totalSteps,doneSteps,
        compliance:total?Math.round(((byStatus["Compliant"]||0)/total)*100):0,
        stepProgress:totalSteps?Math.round((doneSteps/totalSteps)*100):0,
        avgMaturity:total?(maturitySum/total).toFixed(1):"0.0"};
    }
    return r;
  },[userState]);

    for(const fw of FRAMEWORKS){if(!stats[fw])continue;total+=stats[fw].total;compliant+=(stats[fw].byStatus["Compliant"]||0);steps+=stats[fw].totalSteps;stepsDone+=stats[fw].doneSteps;matSum+=parseFloat(stats[fw].avgMaturity||0)}

      if(filterSection!=="All"&&item.sec!==filterSection)return false;

  const gapAnalysis=useMemo(()=>{
